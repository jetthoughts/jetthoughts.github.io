---
name: 'Setup Hugo with caches'
description: 'Install Hugo + Bun, cache dependencies and build artifacts'
inputs:
  hugo-version:
    description: 'Hugo version'
    default: '0.161.1'
  environment:
    description: 'Hugo build environment'
    default: 'production'
  output-dir:
    description: 'Hugo build output directory'
    default: '_dest/public-test'
  base-url:
    description: 'Hugo base URL (default: /)'
    default: '/'
runs:
  using: 'composite'
  steps:
    - uses: jetthoughts/actions-hugo@v3
      with:
        hugo-version: ${{ inputs.hugo-version }}
        extended: true

    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.13

    - name: Cache Bun dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.bun/install/cache
          node_modules
        key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb', '**/package.json') }}
        restore-keys: ${{ runner.os }}-bun-

    - run: bun install --frozen-lockfile
      shell: bash

    # Use Bun as the "node" runtime for Hugo's PostCSS pipeline.
    # Hugo 0.161+ runs Node tools with --permission flags; Bun ignores
    # them. Symlink bun → node so Hugo's hardcoded "node" lookup finds bun.
    - name: Use Bun as Node runtime for Hugo
      shell: bash
      run: |
        mkdir -p "$HOME/.bun-as-node"
        ln -sf "$(which bun)" "$HOME/.bun-as-node/node"
        echo "$HOME/.bun-as-node" >> "$GITHUB_PATH"

    - name: Cache Hugo build
      uses: actions/cache@v5
      with:
        path: |
          /tmp/hugo_cache
          resources/_gen
          _dest
        key: ${{ runner.os }}-hugo-${{ inputs.environment }}-${{ hashFiles('hugo.toml', 'hugo.dev.toml', 'postcss.config.js', 'package.json', '**/bun.lockb', 'themes/**', 'layouts/**', 'content/**') }}
        restore-keys: |
          ${{ runner.os }}-hugo-${{ inputs.environment }}-
          ${{ runner.os }}-hugo-

    # Runs after cache restore so stale-cache clearance isn't reverted.
    - name: Check Node runtime for PostCSS compatibility
      shell: bash
      run: |
        rc=0
        bin/check-node-runtime || rc=$?
        case $rc in
          0) echo "✓ Node runtime OK — continuing with cache restore" ;;
          1) echo "⚠️  bun detected — asset cache cleared, PATH adjusted" ;;
          2) echo "❌ bun detected but real Node.js not found — build may fail" ;;
        esac

    - name: Build Hugo site
      run: PATH="./node_modules/.bin:$PATH" bin/hugo-build
      shell: bash
      env:
        HUGO_CACHEDIR: /tmp/hugo_cache
        ENVIRONMENT: ${{ inputs.environment }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
        BASE_URL: ${{ inputs.base-url }}
