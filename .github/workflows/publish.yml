# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  workflow_dispatch:
  pull_request:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [ master ]
  workflow_run:
    workflows: ["Sync articles"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: ${{ github.event.pull_request.number != '' }}

defaults:
  run:
    shell: bash

jobs:
  build_and_deploy:
    uses: ./.github/workflows/_hugo.yml

  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - uses: ./.github/actions/setup-hugo

      - run: bundle exec rake test:unit
        env:
          PRECOMPILED_ASSETS: '1'
          HUGO_DEFAULT_PATH: _dest/public-test

  link_check:
    name: Broken Internal Links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - uses: ./.github/actions/setup-hugo

      - uses: taiki-e/install-action@v2
        with:
          tool: lychee

      - run: bundle exec rake test:links

  quick_test:
    name: Quick Tests (changed pages)
    runs-on: ubuntu-latest
    # Ceiling only: bin/qtest self-caps scoped work with --budget 90. A change
    # that touches shared chrome/CSS escalates to the critical suite (~2 min).
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          # Need the PR base commit reachable so qtest can diff the branch.
          fetch-depth: 0
          persist-credentials: false

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - uses: ./.github/actions/setup-hugo

      # The screenshot-diff :vips driver FFI-loads the libvips system library,
      # which the ubuntu runner lacks (macOS/the docker gate already have it).
      - name: Install libvips (ruby-vips runtime)
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      # qtest runs ONLY the system tests for the pages this branch touched,
      # budget-capped to ~90s. The baselines come from the docker gate on a
      # different OS/font stack, so the pixel comparison is loosened (tolerance
      # + perceptual threshold) to absorb antialiasing while still catching
      # layout-level regressions. Tune the two values if CI proves flaky.
      - name: Quick scoped smoke for changed pages
        run: bin/qtest --changed "${BASE_SHA:-HEAD~1}" --budget 90
        env:
          SCREENSHOT_TOLERANCE: '0.10'
          SCREENSHOT_PERCEPTUAL_THRESHOLD: '10'
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
