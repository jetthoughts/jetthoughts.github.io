# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  workflow_dispatch:
  pull_request:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [ master ]
  workflow_run:
    workflows: ["Sync articles"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: read  # link_check gate reads the PR file list via the API

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: ${{ github.event.pull_request.number != '' }}

defaults:
  run:
    shell: bash

jobs:
  build_and_deploy:
    uses: ./.github/workflows/_hugo.yml

  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - uses: ./.github/actions/setup-hugo

      - run: bundle exec rake test:unit
        env:
          PRECOMPILED_ASSETS: '1'
          HUGO_DEFAULT_PATH: _dest/public-test

  link_check:
    name: Broken Internal Links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # The 144k-link crawl is the priciest gate, so on PRs run it only when a
      # change could actually move an internal link: content (blog/course/
      # pages), templates, menu/baseURL config, the data records rendered into
      # links, or the checker config itself. A CSS/test/workflow-only PR skips
      # it. Non-PR events (nightly schedule, push to master, manual dispatch)
      # always run so master keeps full coverage. The PR file list comes from
      # the API - cheaper than a full-history checkout just to diff.
      - name: Decide whether to run (only when link-relevant files change)
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "$EVENT_NAME event: running full link check."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          files=$(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/files" --jq '.[].filename')
          if printf '%s\n' "$files" | grep -qE '^(content/|themes/[^/]+/layouts/|config/|data/|lychee\.toml$|Rakefile$)'; then
            echo "Link-relevant files changed: running link check."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "No link-relevant files changed: skipping link check."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v7
        if: steps.gate.outputs.run == 'true'
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@v1
        if: steps.gate.outputs.run == 'true'
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - uses: ./.github/actions/setup-hugo
        if: steps.gate.outputs.run == 'true'

      - uses: taiki-e/install-action@v2
        if: steps.gate.outputs.run == 'true'
        with:
          tool: lychee

      - run: bundle exec rake test:links
        if: steps.gate.outputs.run == 'true'

  quick_test:
    name: Quick Tests (changed pages)
    runs-on: ubuntu-latest
    # Ceiling only: bin/qtest self-caps scoped work with --budget 90. A change
    # that touches shared chrome/CSS escalates to the critical suite (~2 min).
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          # Need the PR base commit reachable so qtest can diff the branch.
          fetch-depth: 0
          persist-credentials: false

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - uses: ./.github/actions/setup-hugo

      # The screenshot-diff :vips driver FFI-loads (dlopen) libvips.so.42 at
      # runtime, which ships in the libvips42 RUNTIME package - not libvips-dev
      # (headers only). The ubuntu runner lacks it (macOS/the docker gate have
      # it). List libvips42 explicitly: the cache action does not resolve the
      # transitive runtime dep, so libvips-dev alone left the .so.42 target of
      # its symlink missing. Cached across runs; bump the version salt to
      # invalidate the entry when the package set changes.
      - name: Install libvips (ruby-vips runtime)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libvips42
          version: '2.0'

      # The cache action restores files without refreshing the linker cache,
      # so register the freshly-placed libvips.so.42 for dlopen, then fail
      # fast with the real LoadError if the FFI load still can't find it -
      # snap_diff otherwise swallows it behind generic per-screenshot errors.
      - name: Verify libvips loads
        run: |
          sudo ldconfig
          bundle exec ruby -e 'require "vips"; puts "libvips #{Vips::VERSION} loaded"'

      # qtest runs ONLY the system tests for the pages this branch touched,
      # budget-capped to ~90s. Cross-OS PIXEL diffing does not work here: the
      # baselines are captured on the docker gate (Alpine/musl, aarch64) while
      # CI runs Ubuntu (glibc, x86_64), so text renders differently enough that
      # measured divergence ran 3-28% (mobile code blocks 28%, plain content
      # pages up to 21%) - far above any tolerance that could still catch a
      # real regression. So CI CAPTURES screenshots but does NOT fail on the
      # diff (FORCE_SCREENSHOT_UPDATE). The FUNCTIONAL assertions in the same
      # system tests still run and gate here: page renders, buttons/text
      # present, no broken elements or JS errors. True visual regression stays
      # with the same-OS gates run before merge - bin/test (macOS) + bin/dtest
      # (docker-linux), both mandatory per CLAUDE.md.
      - name: Quick scoped smoke for changed pages
        run: bin/qtest --changed "${BASE_SHA:-HEAD~1}" --budget 90 --no-escalate
        env:
          FORCE_SCREENSHOT_UPDATE: 'true'
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
