# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  workflow_dispatch:
  pull_request:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [ master ]
  workflow_run:
    workflows: ["Sync articles"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: read  # link_check gate reads the PR file list via the API

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: ${{ github.event.pull_request.number != '' }}

defaults:
  run:
    shell: bash

jobs:
  build_and_deploy:
    uses: ./.github/workflows/_hugo.yml

  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - uses: ./.github/actions/setup-hugo

      - run: bundle exec rake test:unit
        env:
          PRECOMPILED_ASSETS: '1'
          HUGO_DEFAULT_PATH: _dest/public-test

  link_check:
    name: Broken Internal Links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # The 144k-link crawl is the priciest gate, so on PRs run it only when a
      # change could actually move an internal link: content (blog/course/
      # pages), templates, menu/baseURL config, the data records rendered into
      # links, or the checker config itself. A CSS/test/workflow-only PR skips
      # it. Non-PR events (nightly schedule, push to master, manual dispatch)
      # always run so master keeps full coverage. The PR file list comes from
      # the API - cheaper than a full-history checkout just to diff.
      - name: Decide whether to run (only when link-relevant files change)
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "$EVENT_NAME event: running full link check."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          files=$(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/files" --jq '.[].filename')
          if printf '%s\n' "$files" | grep -qE '^(content/|themes/[^/]+/layouts/|config/|data/|lychee\.toml$|Rakefile$)'; then
            echo "Link-relevant files changed: running link check."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "No link-relevant files changed: skipping link check."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v7
        if: steps.gate.outputs.run == 'true'
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@v1
        if: steps.gate.outputs.run == 'true'
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - uses: ./.github/actions/setup-hugo
        if: steps.gate.outputs.run == 'true'

      - uses: taiki-e/install-action@v2
        if: steps.gate.outputs.run == 'true'
        with:
          tool: lychee

      - run: bundle exec rake test:links
        if: steps.gate.outputs.run == 'true'
