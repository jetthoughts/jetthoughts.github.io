# https://gohugo.io/hosting-and-deployment/hosting-on-github/

on:
  workflow_call:

env:
  HUGO_ENVIRONMENT: production


jobs:
  build:
    timeout-minutes: 15
    outputs:
      page_url: ${{ steps.pages.outputs.url }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup Hugo
        uses: jetthoughts/actions-hugo@v3
        with:
          hugo-version: 0.161.1
          extended: true

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      # Tier 1: Dependencies cache (changes infrequently)
      - uses: actions/cache@v5
        name: Cache dependencies
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('**/bun.lockb', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile

      # Use Bun as the "node" runtime for Hugo's PostCSS pipeline.
      # Hugo 0.161+ runs Node tools with --permission flags; Bun ignores
      # them and runs PostCSS without filesystem-permission grief.
      # Symlink bun → node so Hugo's hardcoded "node" lookup finds bun.
      - name: Use Bun as Node runtime for Hugo
        run: |
          mkdir -p "$HOME/.bun-as-node"
          ln -sf "$(which bun)" "$HOME/.bun-as-node/node"
          echo "$HOME/.bun-as-node" >> "$GITHUB_PATH"

      # Tier 2a: Hugo image cache (survives CSS/HTML changes)
      - uses: actions/cache@v5
        name: Cache Hugo processed images
        with:
          path: resources/_gen/images
          key: ${{ runner.os }}-hugo-images-${{ hashFiles('assets/**', 'content/**/*.jpg', 'content/**/*.jpeg', 'content/**/*.png', 'content/**/*.webp', 'content/**/*.gif', 'content/**/*.svg', 'static/**', 'themes/**/static/**', 'themes/**/assets/images/**') }}
          restore-keys: |
            ${{ runner.os }}-hugo-images-

      # Tier 2b: Hugo asset cache (CSS/JS compilation, updates on theme/config changes)
      - uses: actions/cache@v5
        name: Cache Hugo asset compilation
        with:
          path: resources/_gen/assets
          key: ${{ runner.os }}-hugo-assets-${{ hashFiles('themes/**', 'layouts/**', 'postcss.config.js', 'package.json', 'hugo.toml', 'hugo.dev.toml') }}
          restore-keys: |
            ${{ runner.os }}-hugo-assets-

      - name: Build with Hugo
        run: |
          PATH="./node_modules/.bin:app/bin:$PATH" hugo \
            --minify \
            --gc \
            --cleanDestinationDir \
            --baseURL "https://jetthoughts.com/" \
            --environment production

      - name: Remove blog media from artifact
        run: |
          find public/blog/ -type f \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' -o -iname '*.gif' -o -iname '*.webp' \) -delete
          echo "Cleaned blog media. Artifact size:"
          du -sh public/

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ needs.build.outputs.page_url }}
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
