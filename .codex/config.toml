[mcp_servers.claude-context]
command = "npx"
args = [ "-y", "@zilliz/claude-context-mcp@latest",]
id = ""

[mcp_servers.context7]
command = "npx"
args = [ "-y", "@upstash/context7-mcp",]
id = ""

[mcp_servers.brave-search]
command = "npx"
args = [ "-y", "@anthropic/brave-search-mcp",]
id = ""

[mcp_servers.lean-ctx]
command = "npx"
args = [ "-y", "lean-ctx-mcp",]
id = ""

[mcp_servers.chrome-devtools]
command = "npx"
args = [ "-y", "@anthropic/chrome-devtools-mcp",]
id = ""

[mcp_servers.package-search]
command = "npx"
args = [ "-y", "package-search-mcp",]
id = ""

[mcp_servers.github-mcp-server]
command = "npx"
args = [ "-y", "@anthropic/github-mcp-server",]
id = ""

[mcp_servers.claude-context.env]
EMBEDDING_PROVIDER = "Ollama"
EMBEDDING_MODEL = "nomic-embed-text"
OLLAMA_HOST = "http://localhost:11434"
EMBEDDING_DIMENSION = "768"
MILVUS_ADDRESS = "http://localhost:19530"
MILVUS_TOKEN = "root:Milvus"

[mcp_servers.context7.env]

[mcp_servers.brave-search.env]
BRAVE_API_KEY = "${BRAVE_API_KEY}"

[mcp_servers.lean-ctx.env]

[mcp_servers.chrome-devtools.env]

[mcp_servers.package-search.env]

[mcp_servers.github-mcp-server.env]
GITHUB_TOKEN = "${GITHUB_TOKEN}"
