# compose.mcp.yml — MCP Infrastructure for JetThoughts Site
#
# Persistent backends for MCP servers declared in apm.yml → dependencies.mcp.
# Started via: make mcp-up    (docker compose -f compose.mcp.yml up -d)
# Stopped via: make mcp-down  (docker compose -f compose.mcp.yml down)
#
# These run per-repo — clone the repo, run make mcp-up, done.
# Stdio-based MCPs (claude-context, context7, brave-search, etc.) are
# auto-started by the AI tool's MCP client — no compose entry needed.
# ==========================================================================

services:
  # ---- SearXNG — Privacy-respecting meta-search engine ----
  # Used by: searxng MCP server → web research for blog posts
  # Endpoint: http://localhost:8080
  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    volumes:
      - searxng_data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    restart: unless-stopped

  # ---- Milvus — Vector database for semantic search ----
  # Used by: claude-context MCP server (storage backend)
  # Endpoint: http://localhost:19530
  milvus:
    image: milvusdb/milvus:v2.4.0
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    restart: unless-stopped
    depends_on:
      - etcd
      - minio

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"

volumes:
  searxng_data:
  milvus_data:
  etcd_data:
  minio_data:
