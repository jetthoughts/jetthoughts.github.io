# Regression ratchet for course content (content/course/**).
# Every entry is a string a review round REMOVED - it may never return.
# When any future review fixes a defect, ADD its signature here in the SAME
# commit. Checked by bin/validate-course (check_banned_strings) on every build.
# Substring match, case-sensitive, applied to lesson/template markdown bodies.
banned:
  - string: "2.3a"
    reason: "M2 flattened to 2.1-2.6 (2026-07-10); letter suffixes retired"
  - string: "2.3b"
    reason: "M2 flattened to 2.1-2.6"
  - string: "2.1b"
    reason: "synthesis is Lesson 2.5"
  - string: "Most founders"
    reason: "banned cohort generalization (voice guide)"
  - string: "Most non-technical founders"
    reason: "banned cohort generalization"
  - string: "## Why this matters"
    reason: "banned heading (2026-05-28 audit)"
  - string: "  --  "
    reason: "em-dash replacement artifact"
  - string: "Case Study: Tomas & Mia"
    reason: "case studies live only in module-end walkthroughs (30.03 §2.7) - applies to migrated modules M1/M2; remove entries per module as each migrates"
    scope: "mom-test-|ai-persona-|find-10-|clickable-prototype|smoke-test-|form-your-founding|price-hypothesis|module-1-|module-2-|outreach-sequence|validated-problem"
  - string: "<5 of 10 scored"
    reason: "gate is 7+/4-6/<4 (canonical: mom-test-synthesis)"
  - string: "fewer than 5 scores"
    reason: "gate is 7+/4-6/<4"
  - string: "$475/mo flat"
    reason: "nonexistent HN ad product (2026-07-09 claims gate)"
  - string: "70 free credits"
    reason: "volatile third-party hardcode"
  - string: "bypasses paywalls"
    reason: "litigation-adjacent capability claim"
  - string: "3-5× the rate"
    reason: "fabricated-precision stat"
  - string: "6g-how-to-talk-to-users"
    reason: "dead YC URL"
  - string: "test in five interviews"
    reason: "course uses ten interviews everywhere"
  - string: "; ."
    reason: "sweep-introduced dangling fragment (e.g. 'Free trial; .')"
