<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="lenses-title">
  <title id="lenses-title">The four Magic Lenses - score each approach 1-5 and the lowest score is your biggest risk</title>
  <defs>
    <style>
      .heading  { font-family: "Caveat", "Patrick Hand", cursive; font-size: 26px; fill: #1a1a1a; font-weight: 700; }
      .quad-h   { font-family: "Caveat", "Patrick Hand", cursive; font-size: 22px; fill: #cc342d; font-weight: 700; }
      .quad-d   { font-family: "Caveat", "Patrick Hand", cursive; font-size: 16px; fill: #1a1a1a; }
      .note     { font-family: "Caveat", "Patrick Hand", cursive; font-size: 15px; fill: #444; font-style: italic; }
      .approach { font-family: "Caveat", "Patrick Hand", cursive; font-size: 15px; fill: #1a1a1a; font-weight: 700; }
      .axis     { font-family: "Caveat", "Patrick Hand", cursive; font-size: 14px; fill: #444; }
      .quad-box { fill: #fff5f5; stroke: #cc342d; stroke-width: 2.5; stroke-linejoin: round; }
      .risk     { fill: #fbe9ff; stroke: #a855f7; stroke-width: 2.5; stroke-linejoin: round; }
    </style>
  </defs>

  <text x="450" y="38" class="heading" text-anchor="middle">The four Magic Lenses</text>
  <text x="450" y="62" class="note" text-anchor="middle">Score each candidate approach 1-5. The lowest lens is what to test first.</text>

  <!-- 2x2 grid -->
  <!-- Top left: Customer -->
  <rect x="80" y="90" width="370" height="200" class="quad-box" rx="10" transform="rotate(-0.3 265 190)"/>
  <text x="100" y="120" class="quad-h">Customer lens</text>
  <text x="100" y="145" class="quad-d">Would the customer pick this</text>
  <text x="100" y="165" class="quad-d">on a Friday afternoon between</text>
  <text x="100" y="185" class="quad-d">meetings?</text>
  <text x="100" y="215" class="note">1 = needs convincing</text>
  <text x="100" y="235" class="note">5 = bookmarked on first read</text>
  <text x="100" y="265" class="quad-d">Score: ___ / 5</text>

  <!-- Top right: Pragmatic -->
  <rect x="470" y="90" width="370" height="200" class="quad-box" rx="10" transform="rotate(0.2 655 190)"/>
  <text x="490" y="120" class="quad-h">Pragmatic lens</text>
  <text x="490" y="145" class="quad-d">Can you ship something usable</text>
  <text x="490" y="165" class="quad-d">in 4-6 weeks with what you</text>
  <text x="490" y="185" class="quad-d">actually have today?</text>
  <text x="490" y="215" class="note">1 = needs partnerships / compliance</text>
  <text x="490" y="235" class="note">5 = could ship Tuesday</text>
  <text x="490" y="265" class="quad-d">Score: ___ / 5</text>

  <!-- Bottom left: Growth -->
  <rect x="80" y="310" width="370" height="200" class="quad-box" rx="10" transform="rotate(0.3 265 410)"/>
  <text x="100" y="340" class="quad-h">Growth lens</text>
  <text x="100" y="365" class="quad-d">How does the customer hear</text>
  <text x="100" y="385" class="quad-d">about you, and how many of</text>
  <text x="100" y="405" class="quad-d">them are there?</text>
  <text x="100" y="435" class="note">1 = needs sales call to explain</text>
  <text x="100" y="455" class="note">5 = fits a Reddit headline</text>
  <text x="100" y="485" class="quad-d">Score: ___ / 5</text>

  <!-- Bottom right: Money -->
  <rect x="470" y="310" width="370" height="200" class="risk" rx="10" transform="rotate(-0.2 655 410)"/>
  <text x="490" y="340" class="quad-h">Money lens</text>
  <text x="490" y="365" class="quad-d">Do unit economics work at</text>
  <text x="490" y="385" class="quad-d">the scale you can plausibly</text>
  <text x="490" y="405" class="quad-d">reach?</text>
  <text x="490" y="435" class="note">1 = price ceiling under your cost</text>
  <text x="490" y="455" class="note">5 = market pays your sticker price</text>
  <text x="490" y="485" class="quad-d">Score: ___ / 5  ← biggest risk in our example</text>

  <!-- Bottom rule -->
  <rect x="80" y="535" width="760" height="50" class="quad-box" rx="10"/>
  <text x="460" y="557" class="heading" text-anchor="middle">Lowest score = first thing the next test must attack.</text>
  <text x="460" y="578" class="note" text-anchor="middle">Not "build to fix the weakest score" - "test whether the weakest score is the real number."</text>
</svg>
