<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" role="img" aria-labelledby="mad-libs-title">
  <title id="mad-libs-title">The Founding Hypothesis Mad Libs - five blanks that turn a fuzzy idea into a testable sentence</title>
  <defs>
    <style>
      .heading    { font-family: "Caveat", "Patrick Hand", cursive; font-size: 26px; fill: #1a1a1a; font-weight: 700; }
      .blank      { font-family: "Caveat", "Patrick Hand", cursive; font-size: 22px; fill: #cc342d; font-weight: 700; }
      .sentence   { font-family: "Caveat", "Patrick Hand", cursive; font-size: 20px; fill: #1a1a1a; }
      .note       { font-family: "Caveat", "Patrick Hand", cursive; font-size: 15px; fill: #444; font-style: italic; }
      .box        { fill: #fff5f5; stroke: #cc342d; stroke-width: 2.5; stroke-linejoin: round; }
      .pass-box   { fill: #fbe9ff; stroke: #a855f7; stroke-width: 2.5; stroke-linejoin: round; }
    </style>
  </defs>

  <text x="450" y="38" class="heading" text-anchor="middle">The Founding Hypothesis - Mad Libs template</text>
  <text x="450" y="62" class="note" text-anchor="middle">One sentence. Five blanks. Read aloud until a non-co-founder nods on the first pass.</text>

  <!-- Sentence template -->
  <rect x="60" y="90" width="780" height="100" class="box" rx="10" transform="rotate(-0.4 450 140)"/>
  <text x="80" y="125" class="sentence">If we help</text>
  <text x="200" y="125" class="blank">[customer]</text>
  <text x="320" y="125" class="sentence">solve</text>
  <text x="395" y="125" class="blank">[problem]</text>
  <text x="510" y="125" class="sentence">with</text>
  <text x="570" y="125" class="blank">[approach]</text>
  <text x="690" y="125" class="sentence">, they will</text>
  <text x="80" y="165" class="sentence">choose it over</text>
  <text x="250" y="165" class="blank">[competition]</text>
  <text x="395" y="165" class="sentence">because</text>
  <text x="490" y="165" class="blank">[differentiation]</text>
  <text x="660" y="165" class="sentence">.</text>

  <!-- Three worked examples -->
  <text x="60" y="225" class="heading">Three filled-in examples</text>

  <rect x="60" y="240" width="780" height="68" class="pass-box" rx="10" transform="rotate(0.2 450 274)"/>
  <text x="75" y="262" class="note">Gmail in 2003 -</text>
  <text x="75" y="285" class="sentence">If we help heavy email users solve finding old messages with full-text search + 1 GB free,</text>
  <text x="75" y="303" class="sentence">they will pick it over Yahoo Mail because Yahoo charges for storage and has no real search.</text>

  <rect x="60" y="320" width="780" height="68" class="pass-box" rx="10" transform="rotate(-0.3 450 354)"/>
  <text x="75" y="342" class="note">B2B SaaS - solo-practice chiropractic billing -</text>
  <text x="75" y="365" class="sentence">If we help solo chiropractors solve insurance-claim resubmission with a one-click resubmit,</text>
  <text x="75" y="383" class="sentence">they pick it over billing services that take 14 days and charge 8% of recovered claims.</text>

  <rect x="60" y="400" width="780" height="68" class="pass-box" rx="10" transform="rotate(0.3 450 434)"/>
  <text x="75" y="422" class="note">B2C - parents of teens with allergies -</text>
  <text x="75" y="445" class="sentence">If we help parents solve weekend menu safety with a 3-second phone-camera scan,</text>
  <text x="75" y="463" class="sentence">they pick it over reading menus aloud because the teen does not have to feel different.</text>

  <!-- Bottom rule -->
  <rect x="60" y="485" width="780" height="40" class="box" rx="10"/>
  <text x="450" y="510" class="heading" text-anchor="middle">Vague blanks = no test. Specific blanks = a sentence you can falsify in 2 weeks.</text>
</svg>
