<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Patrick Hand', 'Caveat', cursive" role="img" aria-label="Hand-drawn 7-question hiring interview scorecard">
  <defs>
    <filter id="rough" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="1.2"/>
    </filter>
  </defs>
  <rect width="900" height="620" fill="#fffaf3"/>
  <text x="450" y="48" font-size="30" text-anchor="middle" fill="#1a1a1a" font-weight="bold">7-Question Hiring Interview Scorecard</text>
  <text x="450" y="74" font-size="17" text-anchor="middle" fill="#555">Catches AI theater in 30 minutes. Score Pass / Fail in real time.</text>

  <!-- Header -->
  <g filter="url(#rough)">
    <rect x="40" y="100" width="560" height="44" fill="#fff5f5" stroke="#cc342d" stroke-width="2.5"/>
    <rect x="600" y="100" width="100" height="44" fill="#f0f9f0" stroke="#2e7d32" stroke-width="2.5"/>
    <rect x="700" y="100" width="100" height="44" fill="#fff5f5" stroke="#cc342d" stroke-width="2.5"/>
    <rect x="800" y="100" width="60" height="44" fill="#fffbe6" stroke="#bf8a00" stroke-width="2.5"/>
  </g>
  <text x="320" y="129" font-size="20" text-anchor="middle" fill="#1a1a1a" font-weight="bold">Question</text>
  <text x="650" y="129" font-size="18" text-anchor="middle" fill="#1a1a1a" font-weight="bold">Pass</text>
  <text x="750" y="129" font-size="18" text-anchor="middle" fill="#1a1a1a" font-weight="bold">Fail</text>
  <text x="830" y="129" font-size="16" text-anchor="middle" fill="#1a1a1a" font-weight="bold">Notes</text>

  <!-- Rows -->
  <g font-size="17" fill="#1a1a1a">
    <g filter="url(#rough)">
      <rect x="40" y="148" width="820" height="56" fill="#fffaf3" stroke="#999" stroke-width="1.5"/>
    </g>
    <text x="56" y="172">Q1. Workflow: Jira ticket to merged code, name tools + gates</text>
    <text x="56" y="194" font-size="14" fill="#666">real PR from last week, named tool, written sequence</text>
    <circle cx="650" cy="180" r="11" fill="none" stroke="#2e7d32" stroke-width="2"/>
    <circle cx="750" cy="180" r="11" fill="none" stroke="#cc342d" stroke-width="2"/>

    <g filter="url(#rough)">
      <rect x="40" y="204" width="820" height="56" fill="#fffaf3" stroke="#999" stroke-width="1.5"/>
    </g>
    <text x="56" y="228">Q2. Cost: $/dev/month on AI tokens, who pays it</text>
    <text x="56" y="250" font-size="14" fill="#666">per-dev dollar range, pulled from receipt</text>
    <circle cx="650" cy="236" r="11" fill="none" stroke="#2e7d32" stroke-width="2"/>
    <circle cx="750" cy="236" r="11" fill="none" stroke="#cc342d" stroke-width="2"/>

    <g filter="url(#rough)">
      <rect x="40" y="260" width="820" height="56" fill="#fffaf3" stroke="#999" stroke-width="1.5"/>
    </g>
    <text x="56" y="284">Q3. Verification: what reviewer checks on a 200-line AI PR</text>
    <text x="56" y="306" font-size="14" fill="#666">opens real PR on screenshare, names checks</text>
    <circle cx="650" cy="292" r="11" fill="none" stroke="#2e7d32" stroke-width="2"/>
    <circle cx="750" cy="292" r="11" fill="none" stroke="#cc342d" stroke-width="2"/>

    <g filter="url(#rough)">
      <rect x="40" y="316" width="820" height="56" fill="#fffaf3" stroke="#999" stroke-width="1.5"/>
    </g>
    <text x="56" y="340">Q4. Slopsquatting: how do you stop installing a hallucinated package</text>
    <text x="56" y="362" font-size="14" fill="#666">allowlist or scanner, uses the term "slopsquatting"</text>
    <circle cx="650" cy="348" r="11" fill="none" stroke="#2e7d32" stroke-width="2"/>
    <circle cx="750" cy="348" r="11" fill="none" stroke="#cc342d" stroke-width="2"/>

    <g filter="url(#rough)">
      <rect x="40" y="372" width="820" height="56" fill="#fffaf3" stroke="#999" stroke-width="1.5"/>
    </g>
    <text x="56" y="396">Q5. Accountability: last AI-code incident you owned</text>
    <text x="56" y="418" font-size="14" fill="#666">specific incident, date, root cause, workflow change</text>
    <circle cx="650" cy="404" r="11" fill="none" stroke="#2e7d32" stroke-width="2"/>
    <circle cx="750" cy="404" r="11" fill="none" stroke="#cc342d" stroke-width="2"/>

    <!-- New rows highlighted -->
    <g filter="url(#rough)">
      <rect x="40" y="428" width="820" height="56" fill="#fff5f5" stroke="#cc342d" stroke-width="3"/>
    </g>
    <text x="56" y="452" font-weight="bold">Q6. NEW. Refactor: last one you led - what stayed/changed/broke</text>
    <text x="56" y="474" font-size="14" fill="#666">named system, safety net, small steps, rollback plan</text>
    <circle cx="650" cy="460" r="11" fill="none" stroke="#2e7d32" stroke-width="2.5"/>
    <circle cx="750" cy="460" r="11" fill="none" stroke="#cc342d" stroke-width="2.5"/>

    <g filter="url(#rough)">
      <rect x="40" y="484" width="820" height="56" fill="#fff5f5" stroke="#cc342d" stroke-width="3"/>
    </g>
    <text x="56" y="508" font-weight="bold">Q7. NEW. Disagreement: PR review where you said no to the AI</text>
    <text x="56" y="530" font-size="14" fill="#666">screenshare a real GitHub comment, technical reason</text>
    <circle cx="650" cy="516" r="11" fill="none" stroke="#2e7d32" stroke-width="2.5"/>
    <circle cx="750" cy="516" r="11" fill="none" stroke="#cc342d" stroke-width="2.5"/>
  </g>

  <!-- Red highlighter circle on Q6 + Q7 -->
  <g fill="none" stroke="#cc342d" stroke-width="3" opacity="0.55">
    <path d="M 30 425 Q 28 480 35 545 Q 870 555 873 540 Q 880 480 870 425 Q 450 415 30 425 Z"/>
  </g>

  <text x="450" y="585" font-size="16" text-anchor="middle" fill="#666" font-style="italic">Score: above 7 = book reference. 5-7 = sit on it overnight. Below 5 = polite no by tomorrow.</text>
</svg>
