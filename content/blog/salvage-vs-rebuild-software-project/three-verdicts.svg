<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="'Caveat','Patrick Hand',cursive" role="img" aria-labelledby="title desc">
  <title id="title">Three verdicts side by side: KEEP, FREEZE, REBUILD</title>
  <desc id="desc">A sketchy three-panel SVG. Left panel KEEP (green) shows score 5-6 with a hardening checklist. Middle panel FREEZE (yellow) shows score 3-4 with a 60-day stabilize plan. Right panel REBUILD (red) shows score 0-2 with two parallel codebases and a feature flag, NOT a full rewrite.</desc>
  <style>
    .h{font-size:30px;fill:#1a1a1a;font-weight:700}
    .score{font-size:42px;fill:#1a1a1a;font-weight:700}
    .lbl{font-size:18px;fill:#1a1a1a}
    .bullet{font-size:16px;fill:#1a1a1a}
    .strike{font-size:16px;fill:#777;text-decoration:line-through}
    .panel-good{fill:#f0f9f0;stroke:#2e7d32;stroke-width:2.5}
    .panel-warn{fill:#fffaf0;stroke:#b8860b;stroke-width:2.5}
    .panel-bad{fill:#fff5f5;stroke:#cc342d;stroke-width:2.5}
    .tag-good{fill:#2e7d32;font-size:18px;font-weight:700}
    .tag-warn{fill:#b8860b;font-size:18px;font-weight:700}
    .tag-bad{fill:#cc342d;font-size:18px;font-weight:700}
  </style>

  <!-- KEEP -->
  <rect x="20" y="20" width="300" height="420" rx="10" class="panel-good"/>
  <text x="170" y="58" class="h" text-anchor="middle">KEEP</text>
  <text x="170" y="100" class="score" text-anchor="middle">5-6</text>
  <text x="170" y="124" class="tag-good" text-anchor="middle">and harden</text>
  <line x1="40" y1="142" x2="300" y2="142" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="40" y="170" class="bullet">- One senior hire, owns the repo</text>
  <text x="40" y="200" class="bullet">- Tests up to 40% by day 90</text>
  <text x="40" y="230" class="bullet">- Monitoring + nightly backups</text>
  <text x="40" y="260" class="bullet">- Spend the rebuild budget</text>
  <text x="40" y="282" class="bullet">  on hardening, not a rewrite</text>
  <text x="40" y="330" class="strike">- Full rewrite</text>
  <text x="40" y="354" class="strike">- New stack</text>
  <text x="40" y="378" class="strike">- Burn it down</text>
  <text x="170" y="418" class="lbl" text-anchor="middle">90-day plan</text>

  <!-- FREEZE -->
  <rect x="340" y="20" width="300" height="420" rx="10" class="panel-warn"/>
  <text x="490" y="58" class="h" text-anchor="middle">FREEZE</text>
  <text x="490" y="100" class="score" text-anchor="middle">3-4</text>
  <text x="490" y="124" class="tag-warn" text-anchor="middle">and stabilize</text>
  <line x1="360" y1="142" x2="620" y2="142" stroke="#b8860b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="360" y="170" class="bullet">- 60 days, zero new features</text>
  <text x="360" y="200" class="bullet">- Sprint 1: ownership audit</text>
  <text x="360" y="230" class="bullet">- Sprint 2: tests on top 3 flows</text>
  <text x="360" y="260" class="bullet">- Sprint 3: monitoring + backups</text>
  <text x="360" y="290" class="bullet">- Re-score on day 60</text>
  <text x="360" y="334" class="bullet">If 5+ -> KEEP</text>
  <text x="360" y="358" class="bullet">If 3-4 -> REBUILD core paths</text>
  <text x="490" y="418" class="lbl" text-anchor="middle">60-day plan</text>

  <!-- REBUILD -->
  <rect x="660" y="20" width="280" height="420" rx="10" class="panel-bad"/>
  <text x="800" y="58" class="h" text-anchor="middle">REBUILD</text>
  <text x="800" y="100" class="score" text-anchor="middle">0-2</text>
  <text x="800" y="124" class="tag-bad" text-anchor="middle">core paths only</text>
  <line x1="680" y1="142" x2="920" y2="142" stroke="#cc342d" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="680" y="170" class="bullet">- Pick the 2-3 flows that</text>
  <text x="680" y="192" class="bullet">  carry 80% of the business</text>
  <text x="680" y="222" class="bullet">- Parallel codebase, not a fork</text>
  <text x="680" y="252" class="bullet">- Feature flag the cutover</text>
  <text x="680" y="282" class="bullet">- Legacy stays running 90 days</text>
  <text x="680" y="312" class="bullet">- Sunset legacy one flow at a time</text>
  <text x="680" y="358" class="strike">- Throw it all out</text>
  <text x="680" y="382" class="strike">- "Start fresh" Big Bang</text>
  <text x="800" y="418" class="lbl" text-anchor="middle">30/60/90-day plan</text>
</svg>
