<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'Caveat','Patrick Hand',cursive">
  <defs>
    <filter id="rough3" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="9"/>
      <feDisplacementMap in="SourceGraphic" scale="1.8"/>
    </filter>
  </defs>
  <rect width="960" height="620" fill="#fafaf7"/>

  <!-- Title -->
  <text x="480" y="40" font-size="32" text-anchor="middle" fill="#1a1a1a" font-weight="bold">The 5 jobs of a Fractional CTO</text>
  <text x="480" y="68" font-size="18" text-anchor="middle" fill="#555">5 hrs/wk, $400-600/wk, $0 equity. One sentence per job.</text>

  <!-- Job 1: Architecture review (top-left) -->
  <rect x="40" y="100" width="290" height="170" fill="#e8f4f8" stroke="#0277bd" stroke-width="2.5" filter="url(#rough3)"/>
  <text x="60" y="134" font-size="22" fill="#0277bd" font-weight="bold">1. Architecture review</text>
  <text x="60" y="160" font-size="18" fill="#1a1a1a">1 hr/wk · Monday morning</text>
  <text x="60" y="190" font-size="17" fill="#444">"This is Rails, not microservices.</text>
  <text x="60" y="212" font-size="17" fill="#444">One Postgres, not 3 databases.</text>
  <text x="60" y="234" font-size="17" fill="#444">Defer the queue until month 4."</text>
  <text x="60" y="258" font-size="14" fill="#a3621e" font-style="italic">prevents the rebuild</text>

  <!-- Job 2: PR review (top-center) -->
  <rect x="345" y="100" width="290" height="170" fill="#fffbe6" stroke="#bf8a00" stroke-width="2.5" filter="url(#rough3)"/>
  <text x="365" y="134" font-size="22" fill="#bf8a00" font-weight="bold">2. PR review</text>
  <text x="365" y="160" font-size="18" fill="#1a1a1a">2 hrs/wk · every PR before merge</text>
  <text x="365" y="190" font-size="17" fill="#444">Catches the API key in the diff.</text>
  <text x="365" y="212" font-size="17" fill="#444">Catches the n+1 in line 47.</text>
  <text x="365" y="234" font-size="17" fill="#444">Catches the abstraction nobody asked for.</text>
  <text x="365" y="258" font-size="14" fill="#a3621e" font-style="italic">stops the leak before prod</text>

  <!-- Job 3: Hiring filter (top-right) -->
  <rect x="650" y="100" width="290" height="170" fill="#f0f9f0" stroke="#2e7d32" stroke-width="2.5" filter="url(#rough3)"/>
  <text x="670" y="134" font-size="22" fill="#2e7d32" font-weight="bold">3. Hiring filter</text>
  <text x="670" y="160" font-size="18" fill="#1a1a1a">1 hr/wk · only during hire sprint</text>
  <text x="670" y="190" font-size="17" fill="#444">Tech screen for any new contractor.</text>
  <text x="670" y="212" font-size="17" fill="#444">Reads their last 3 GitHub commits.</text>
  <text x="670" y="234" font-size="17" fill="#444">Tells you who is real.</text>
  <text x="670" y="258" font-size="14" fill="#a3621e" font-style="italic">prevents the wrong-fit hire</text>

  <!-- Job 4: Vendor BS detection (bottom-left) -->
  <rect x="190" y="310" width="290" height="170" fill="#f5e9ff" stroke="#7c3aed" stroke-width="2.5" filter="url(#rough3)"/>
  <text x="210" y="344" font-size="22" fill="#7c3aed" font-weight="bold">4. Vendor BS detection</text>
  <text x="210" y="370" font-size="18" fill="#1a1a1a">as needed · sits in agency calls</text>
  <text x="210" y="400" font-size="17" fill="#444">"Why GraphQL, not REST?"</text>
  <text x="210" y="422" font-size="17" fill="#444">"Why Kubernetes for 200 users?"</text>
  <text x="210" y="444" font-size="17" fill="#444">"Show me the monorepo plan."</text>
  <text x="210" y="468" font-size="14" fill="#a3621e" font-style="italic">asks the questions you can't</text>

  <!-- Job 5: Founder coaching (bottom-right) -->
  <rect x="495" y="310" width="290" height="170" fill="#fff5f5" stroke="#cc342d" stroke-width="2.5" filter="url(#rough3)"/>
  <text x="515" y="344" font-size="22" fill="#cc342d" font-weight="bold">5. Founder coaching</text>
  <text x="515" y="370" font-size="18" fill="#1a1a1a">1 hr/wk · Friday roadmap call</text>
  <text x="515" y="400" font-size="17" fill="#444">Translates "the queue is backed up"</text>
  <text x="515" y="422" font-size="17" fill="#444">into "promise the demo for May 12,</text>
  <text x="515" y="444" font-size="17" fill="#444">not May 5."</text>
  <text x="515" y="468" font-size="14" fill="#a3621e" font-style="italic">aligns roadmap to engineering reality</text>

  <!-- Footer math -->
  <rect x="120" y="520" width="720" height="78" fill="#fffacc" stroke="#cc342d" stroke-width="2" filter="url(#rough3)"/>
  <text x="480" y="552" font-size="22" text-anchor="middle" fill="#1a1a1a" font-weight="bold">1 + 2 + 1 + flex + 1 = 5 hours per week.</text>
  <text x="480" y="582" font-size="18" text-anchor="middle" fill="#555" font-style="italic">$400-600/wk all-in. Less than your contractor charges for a single sprint.</text>
</svg>
