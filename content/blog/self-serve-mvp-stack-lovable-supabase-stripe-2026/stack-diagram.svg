<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 640" font-family="'Caveat','Patrick Hand',cursive">
  <defs>
    <filter id="rough" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="5"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cc342d"/>
    </marker>
  </defs>
  <rect width="920" height="640" fill="#fafaf7"/>

  <!-- Title -->
  <text x="460" y="42" font-size="32" text-anchor="middle" fill="#1a1a1a" font-weight="bold">The Self-Serve MVP Stack (2026)</text>
  <text x="460" y="70" font-size="20" text-anchor="middle" fill="#555">Three boxes, two arrows, one staging URL by Friday week 4.</text>

  <!-- The user (top) -->
  <ellipse cx="460" cy="120" rx="90" ry="32" fill="#fff5f5" stroke="#cc342d" stroke-width="2.5" filter="url(#rough)"/>
  <text x="460" y="115" font-size="22" text-anchor="middle" fill="#cc342d" font-weight="bold">Your buyer</text>
  <text x="460" y="138" font-size="16" text-anchor="middle" fill="#555">opens the staging URL</text>

  <!-- Arrow user -> Lovable -->
  <line x1="460" y1="155" x2="460" y2="195" stroke="#cc342d" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Layer 1: Lovable (UI) -->
  <rect x="120" y="200" width="680" height="110" fill="#f0f9f0" stroke="#2e7d32" stroke-width="2.5" filter="url(#rough)"/>
  <text x="150" y="232" font-size="26" fill="#2e7d32" font-weight="bold">1. Lovable - the UI layer</text>
  <text x="150" y="258" font-size="18" fill="#1a1a1a">AI-generated React frontend. You describe the screen in English, it ships the form, the table, the auth modal.</text>
  <text x="150" y="282" font-size="18" fill="#444">~$25 to $100 / month. Deploys to a public staging URL on every save.</text>
  <text x="150" y="304" font-size="17" fill="#a3621e" font-style="italic">Job: render the screens. Send the form data downward.</text>

  <!-- Arrow Lovable -> Supabase (REST/JS client) -->
  <line x1="320" y1="320" x2="320" y2="365" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="335" y="345" font-size="14" fill="#2e7d32" font-style="italic">REST / JS client</text>

  <!-- Layer 2: Supabase (DB + auth) -->
  <rect x="120" y="370" width="680" height="110" fill="#e8f4f8" stroke="#0277bd" stroke-width="2.5" filter="url(#rough)"/>
  <text x="150" y="402" font-size="26" fill="#0277bd" font-weight="bold">2. Supabase - the data layer</text>
  <text x="150" y="428" font-size="18" fill="#1a1a1a">Managed Postgres + auth + file storage + row-level security. Free tier handles ~50K monthly active users.</text>
  <text x="150" y="452" font-size="18" fill="#444">$0 free / $25 Pro / $599 Team. Auto-generates a REST + GraphQL API on top of your tables.</text>
  <text x="150" y="474" font-size="17" fill="#a3621e" font-style="italic">Job: store the user, the row, the file. Listen for Stripe events.</text>

  <!-- Arrow Supabase -> Stripe (webhook) -->
  <line x1="600" y1="490" x2="600" y2="535" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="615" y="515" font-size="14" fill="#7c3aed" font-style="italic">webhook + checkout</text>

  <!-- Layer 3: Stripe (payments) -->
  <rect x="120" y="540" width="680" height="80" fill="#f5e9ff" stroke="#7c3aed" stroke-width="2.5" filter="url(#rough)"/>
  <text x="150" y="572" font-size="26" fill="#7c3aed" font-weight="bold">3. Stripe - the money layer</text>
  <text x="150" y="598" font-size="18" fill="#1a1a1a">Checkout link or embedded element. 2.9% + $0.30 per transaction. Webhooks update Supabase on success.</text>
  <text x="150" y="618" font-size="17" fill="#a3621e" font-style="italic">Job: charge the card. Tell Supabase the customer is paid.</text>
</svg>
