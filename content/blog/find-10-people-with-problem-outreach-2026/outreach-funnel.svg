<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-label="Outreach funnel: 5 steps from Reddit and LinkedIn mining at the top down to 10 calls booked on Friday">
  <title>5-step outreach funnel - Reddit and LinkedIn mining to 10 booked calls</title>
  <desc>Step 1 Reddit and LinkedIn mining. Step 2 Clay or Apollo list. Step 3 Smartlead and Lindy sequence. Step 4 Calendly booking. Step 5 10 calls Friday.</desc>
  <defs>
    <style>
      .h { font-family: "Patrick Hand", "Caveat", "Comic Sans MS", cursive; }
      .label { font-size: 20px; fill: #1a1a1a; }
      .sub { font-size: 16px; fill: #555; }
      .num { font-size: 28px; fill: #cc342d; font-weight: bold; }
      .stepbox { fill: #fff; stroke: #cc342d; stroke-width: 2.5; }
      .stepbox-p { fill: #faf5ff; stroke: #a855f7; stroke-width: 2.5; }
      .finalbox { fill: #f0f9f0; stroke: #2e7d32; stroke-width: 3; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; }
      .legend { font-size: 14px; fill: #333; }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <rect width="960" height="720" fill="#fafafa"/>

  <text x="480" y="38" text-anchor="middle" class="h" font-size="26" fill="#1a1a1a">From "I don't know anyone" to 10 calls booked.</text>
  <text x="480" y="64" text-anchor="middle" class="h legend">One Monday morning. $200 to $500 in tools.</text>

  <!-- Step 1: widest funnel top -->
  <path d="M 130 100 L 830 100 L 770 180 L 190 180 Z" class="stepbox"/>
  <text x="170" y="148" class="h num">1</text>
  <text x="480" y="135" text-anchor="middle" class="h label">Mine where they're complaining</text>
  <text x="480" y="160" text-anchor="middle" class="h sub">Reddit / LinkedIn / Discord / G2 - 30 sentences in their words</text>

  <line x1="480" y1="180" x2="480" y2="210" class="arrow" marker-end="url(#arrowHead)"/>

  <!-- Step 2 -->
  <path d="M 200 220 L 760 220 L 710 300 L 250 300 Z" class="stepbox"/>
  <text x="225" y="270" class="h num">2</text>
  <text x="480" y="255" text-anchor="middle" class="h label">Build the ICP list</text>
  <text x="480" y="280" text-anchor="middle" class="h sub">Clay ($149/mo) or Apollo ($49 to $149) - 80 to 120 rows</text>

  <line x1="480" y1="300" x2="480" y2="330" class="arrow" marker-end="url(#arrowHead)"/>

  <!-- Step 3 -->
  <path d="M 260 340 L 700 340 L 650 420 L 310 420 Z" class="stepbox"/>
  <text x="285" y="390" class="h num">3</text>
  <text x="480" y="375" text-anchor="middle" class="h label">Run the 3-email sequence</text>
  <text x="480" y="400" text-anchor="middle" class="h sub">Smartlead ($37-$94) + Lindy AI agent ($49)</text>

  <line x1="480" y1="420" x2="480" y2="450" class="arrow" marker-end="url(#arrowHead)"/>

  <!-- Step 4 - panel sidebar -->
  <path d="M 310 460 L 650 460 L 600 540 L 360 540 Z" class="stepbox-p"/>
  <text x="335" y="510" class="h num">4</text>
  <text x="480" y="495" text-anchor="middle" class="h label">Backup: paid panels</text>
  <text x="480" y="520" text-anchor="middle" class="h sub">User Interviews / Respondent - $50 to $150 per call</text>

  <line x1="480" y1="540" x2="480" y2="570" class="arrow" marker-end="url(#arrowHead)"/>

  <!-- Step 5 - Final -->
  <path d="M 360 580 L 600 580 L 560 660 L 400 660 Z" class="finalbox"/>
  <text x="480" y="615" text-anchor="middle" class="h label" font-size="22">10 calls booked</text>
  <text x="480" y="640" text-anchor="middle" class="h sub" font-size="17">by Friday afternoon</text>

  <!-- Legend -->
  <text x="60" y="700" class="h legend">Red = main path. Purple = paid-panel sidebar. Green = the outcome you measure on Friday.</text>
</svg>
