<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" role="img" aria-labelledby="team-title">
  <title id="team-title">What the kickoff deck showed vs who actually shipped your pull requests</title>
  <defs>
    <style>
      .panel-title    { font-family: "Caveat", "Patrick Hand", cursive; font-size: 26px; fill: #1a1a1a; font-weight: 700; }
      .person         { font-family: "Caveat", "Patrick Hand", cursive; font-size: 19px; fill: #1a1a1a; font-weight: 600; }
      .note           { font-family: "Caveat", "Patrick Hand", cursive; font-size: 15px; fill: #666; font-style: italic; }
      .caption        { font-family: "Caveat", "Patrick Hand", cursive; font-size: 18px; fill: #666; font-style: italic; }
      .pitch-box      { fill: #f0f9f0; stroke: #2e7d32; stroke-width: 2.5; stroke-linejoin: round; }
      .reality-box    { fill: #fff5f5; stroke: #cc342d; stroke-width: 2.5; stroke-linejoin: round; }
      .reality-hidden { fill: #ffe5e5; stroke: #cc342d; stroke-width: 2; stroke-dasharray: 6 4; stroke-linejoin: round; }
    </style>
  </defs>

  <text x="240" y="40" class="panel-title" text-anchor="middle">WHAT THE KICKOFF DECK SAID</text>

  <rect x="80" y="65" width="320" height="65" rx="10" class="pitch-box" transform="rotate(-0.4 240 98)"/>
  <text x="240" y="93" class="person" text-anchor="middle">Senior Dev / Tech Lead</text>
  <text x="240" y="116" class="note" text-anchor="middle">"available for architecture calls"</text>

  <rect x="80" y="145" width="320" height="65" rx="10" class="pitch-box" transform="rotate(0.3 240 178)"/>
  <text x="240" y="173" class="person" text-anchor="middle">Mid-level Engineer</text>
  <text x="240" y="196" class="note" text-anchor="middle">"daily shipper"</text>

  <rect x="80" y="225" width="320" height="65" rx="10" class="pitch-box" transform="rotate(-0.3 240 258)"/>
  <text x="240" y="253" class="person" text-anchor="middle">Mid-level Engineer</text>
  <text x="240" y="276" class="note" text-anchor="middle">"daily shipper"</text>

  <rect x="80" y="305" width="320" height="65" rx="10" class="pitch-box" transform="rotate(0.4 240 338)"/>
  <text x="240" y="333" class="person" text-anchor="middle">Junior Engineer</text>
  <text x="240" y="356" class="note" text-anchor="middle">"in mentorship"</text>

  <rect x="80" y="385" width="320" height="65" rx="10" class="pitch-box" transform="rotate(-0.3 240 418)"/>
  <text x="240" y="413" class="person" text-anchor="middle">PM (¼ allocation)</text>
  <text x="240" y="436" class="note" text-anchor="middle">"runs your standups"</text>

  <text x="240" y="500" class="caption" text-anchor="middle">5 named people on the slide</text>
  <text x="240" y="522" class="caption" text-anchor="middle">$44K / month bill rate</text>

  <text x="745" y="40" class="panel-title" text-anchor="middle">WHO ACTUALLY SHIPPED THE PRs</text>

  <rect x="585" y="65" width="320" height="65" rx="10" class="reality-box" transform="rotate(0.4 745 98)"/>
  <text x="745" y="93" class="person" text-anchor="middle">Senior Dev · 1-2 days/week</text>
  <text x="745" y="116" class="note" text-anchor="middle">3 other clients, signs off most weeks</text>

  <rect x="585" y="145" width="320" height="65" rx="10" class="reality-box" transform="rotate(-0.3 745 178)"/>
  <text x="745" y="173" class="person" text-anchor="middle">Mid Engineer · full-time</text>
  <text x="745" y="196" class="note" text-anchor="middle">writes 60% of code</text>

  <rect x="585" y="225" width="320" height="65" rx="10" class="reality-box" transform="rotate(0.3 745 258)"/>
  <text x="745" y="253" class="person" text-anchor="middle">Mid Engineer · part-time</text>
  <text x="745" y="276" class="note" text-anchor="middle">writes 30% of code (other client most weeks)</text>

  <rect x="585" y="305" width="320" height="65" rx="10" class="reality-hidden" transform="rotate(-0.4 745 338)"/>
  <text x="745" y="333" class="person" text-anchor="middle">Subcontracted Junior #1</text>
  <text x="745" y="356" class="note" text-anchor="middle">"from a partner shop you didn't meet"</text>

  <rect x="585" y="385" width="320" height="65" rx="10" class="reality-hidden" transform="rotate(0.3 745 418)"/>
  <text x="745" y="413" class="person" text-anchor="middle">Subcontracted Juniors #2, #3</text>
  <text x="745" y="436" class="note" text-anchor="middle">rotating, AI-augmented, no Slack handle in your repo</text>

  <text x="745" y="500" class="caption" text-anchor="middle">1 senior (part-time) + 2 mid + 3 hidden juniors</text>
  <text x="745" y="522" class="caption" text-anchor="middle">Senior rate paid; junior work delivered</text>

  <line x1="480" y1="60" x2="480" y2="540" stroke="#cccccc" stroke-width="1" stroke-dasharray="4 4"/>

  <text x="500" y="570" class="caption" text-anchor="middle">Same five seats. Different five humans. Ask the six questions in the next section to learn which side of this chart you're on.</text>
</svg>
