<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" role="img" aria-labelledby="attn-title">
  <title id="attn-title">PR reviewer attention math: 4 projects, 15 minutes per PR, what gets missed</title>
  <defs>
    <style>
      .title    { font-family: "Caveat", "Patrick Hand", cursive; font-size: 26px; fill: #1a1a1a; font-weight: 700; }
      .label    { font-family: "Caveat", "Patrick Hand", cursive; font-size: 18px; fill: #1a1a1a; }
      .label-w  { font-family: "Caveat", "Patrick Hand", cursive; font-size: 18px; fill: #ffffff; font-weight: 700; }
      .small    { font-family: "Caveat", "Patrick Hand", cursive; font-size: 15px; fill: #1a1a1a; }
      .number   { font-family: "Caveat", "Patrick Hand", cursive; font-size: 26px; fill: #cc342d; font-weight: 700; }
      .you-box     { fill: #cc342d; stroke: #1a1a1a; stroke-width: 2; }
      .other-box   { fill: #e0e0e0; stroke: #1a1a1a; stroke-width: 2; }
      .pr-good     { fill: #f0f9f0; stroke: #2e7d32; stroke-width: 2; stroke-linejoin: round; }
      .pr-bad      { fill: #fff5f5; stroke: #cc342d; stroke-width: 2; stroke-linejoin: round; }
      .arrow       { stroke: #1a1a1a; stroke-width: 2; stroke-linecap: round; fill: none; }
      .quote       { font-family: "Caveat", "Patrick Hand", cursive; font-size: 19px; fill: #cc342d; font-style: italic; }
    </style>
  </defs>

  <text x="500" y="35" class="title" text-anchor="middle">Your senior reviewer's week, by project</text>

  <text x="60"  y="80" class="label">Mon</text>
  <text x="280" y="80" class="label">Tue</text>
  <text x="500" y="80" class="label">Wed</text>
  <text x="720" y="80" class="label">Thu</text>
  <text x="900" y="80" class="label">Fri</text>

  <rect x="50"  y="90" width="220" height="50" class="other-box"/>
  <text x="160" y="120" class="label" text-anchor="middle">Client A · 25%</text>

  <rect x="270" y="90" width="220" height="50" class="other-box"/>
  <text x="380" y="120" class="label" text-anchor="middle">Client B · 25%</text>

  <rect x="490" y="90" width="220" height="50" class="you-box"/>
  <text x="600" y="120" class="label-w" text-anchor="middle">YOUR PROJECT · 25%</text>

  <rect x="710" y="90" width="220" height="50" class="other-box"/>
  <text x="820" y="120" class="label" text-anchor="middle">Client D · 25%</text>

  <text x="500" y="180" class="label" text-anchor="middle">10 hours/week on your repo  ÷  ~40 PRs/week  =</text>
  <text x="500" y="215" class="number" text-anchor="middle">15 minutes per PR</text>

  <text x="500" y="260" class="label" text-anchor="middle">What 15 minutes catches vs what it misses:</text>

  <rect x="100" y="275" width="240" height="115" rx="10" class="pr-good" transform="rotate(-0.5 220 332)"/>
  <text x="220" y="305" class="label" text-anchor="middle">✓ Diff looks reasonable</text>
  <text x="220" y="330" class="label" text-anchor="middle">✓ CI passed green</text>
  <text x="220" y="355" class="label" text-anchor="middle">✓ Style nits flagged</text>
  <text x="220" y="380" class="label" text-anchor="middle">✓ Click approve</text>

  <rect x="660" y="275" width="240" height="115" rx="10" class="pr-bad" transform="rotate(0.4 780 332)"/>
  <text x="780" y="300" class="small" text-anchor="middle">✗ Auth regression in before_action</text>
  <text x="780" y="320" class="small" text-anchor="middle">✗ N+1 query in dashboard endpoint</text>
  <text x="780" y="340" class="small" text-anchor="middle">✗ Stripe webhook secret in controller</text>
  <text x="780" y="360" class="small" text-anchor="middle">✗ Test coverage silently dropped 11%</text>
  <text x="780" y="380" class="small" text-anchor="middle">✗ Migration that locks orders table</text>

  <path class="arrow" d="M 340 332 L 660 332"/>
  <path class="arrow" d="M 655 326 L 660 332 L 655 338"/>

  <text x="500" y="440" class="quote" text-anchor="middle">"We trust the senior to catch issues" - the senior had 15 minutes and three other clients.</text>
</svg>
