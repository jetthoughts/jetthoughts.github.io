<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Caveat','Patrick Hand',cursive" role="img" aria-labelledby="title desc">
  <title id="title">File-touch heatmap across 6 weeks of a sprint</title>
  <desc id="desc">A grid of 6 weeks by 5 days showing files-changed per merged PR. Green cells under 20, yellow 20-50, red over 50. Red cells cluster in week 2 and week 4, marking where the build audit should have fired.</desc>
  <style>
    .h{font-size:22px;fill:#1a1a1a;font-weight:700}
    .axis{font-size:15px;fill:#1a1a1a}
    .cell-num{font-size:14px;fill:#1a1a1a;text-anchor:middle;font-weight:700}
    .legend{font-size:14px;fill:#1a1a1a}
    .note{font-size:14px;fill:#cc342d;font-weight:700}
  </style>

  <text x="20" y="35" class="h">Files changed per merged PR (6-week sprint)</text>
  <text x="20" y="58" class="axis" font-style="italic">Read each cell. Yellow = check. Red = audit fires.</text>

  <!-- Day labels (top) -->
  <text x="180" y="95" class="axis" text-anchor="middle">Mon</text>
  <text x="280" y="95" class="axis" text-anchor="middle">Tue</text>
  <text x="380" y="95" class="axis" text-anchor="middle">Wed</text>
  <text x="480" y="95" class="axis" text-anchor="middle">Thu</text>
  <text x="580" y="95" class="axis" text-anchor="middle">Fri</text>

  <!-- Week labels (left) + cells -->
  <!-- Week 1 -->
  <text x="20" y="135" class="axis">Week 1</text>
  <rect x="135" y="110" width="90" height="40" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="180" y="136" class="cell-num">4</text>
  <rect x="235" y="110" width="90" height="40" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="280" y="136" class="cell-num">7</text>
  <rect x="335" y="110" width="90" height="40" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="380" y="136" class="cell-num">3</text>
  <rect x="435" y="110" width="90" height="40" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="480" y="136" class="cell-num">9</text>
  <rect x="535" y="110" width="90" height="40" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="580" y="136" class="cell-num">6</text>
  <text x="650" y="136" class="legend" fill="#2e7d32">on the brief</text>

  <!-- Week 2 - red cluster -->
  <text x="20" y="180" class="axis">Week 2</text>
  <rect x="135" y="155" width="90" height="40" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="180" y="181" class="cell-num">11</text>
  <rect x="235" y="155" width="90" height="40" fill="#ffe082" stroke="#f57f17" stroke-width="1.5"/>
  <text x="280" y="181" class="cell-num">28</text>
  <rect x="335" y="155" width="90" height="40" fill="#ef9a9a" stroke="#cc342d" stroke-width="2"/>
  <text x="380" y="181" class="cell-num">62</text>
  <rect x="435" y="155" width="90" height="40" fill="#ef9a9a" stroke="#cc342d" stroke-width="2"/>
  <text x="480" y="181" class="cell-num">47</text>
  <rect x="535" y="155" width="90" height="40" fill="#ef9a9a" stroke="#cc342d" stroke-width="2"/>
  <text x="580" y="181" class="cell-num">88</text>
  <text x="650" y="181" class="note">audit fires</text>

  <!-- Week 3 - yellow recovery -->
  <text x="20" y="225" class="axis">Week 3</text>
  <rect x="135" y="200" width="90" height="40" fill="#ffe082" stroke="#f57f17" stroke-width="1.5"/>
  <text x="180" y="226" class="cell-num">22</text>
  <rect x="235" y="200" width="90" height="40" fill="#ffe082" stroke="#f57f17" stroke-width="1.5"/>
  <text x="280" y="226" class="cell-num">35</text>
  <rect x="335" y="200" width="90" height="40" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="380" y="226" class="cell-num">14</text>
  <rect x="435" y="200" width="90" height="40" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="480" y="226" class="cell-num">8</text>
  <rect x="535" y="200" width="90" height="40" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="580" y="226" class="cell-num">5</text>
  <text x="650" y="226" class="legend" fill="#f57f17">recovery</text>

  <!-- Week 4 - red cluster again -->
  <text x="20" y="270" class="axis">Week 4</text>
  <rect x="135" y="245" width="90" height="40" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="180" y="271" class="cell-num">12</text>
  <rect x="235" y="245" width="90" height="40" fill="#ffe082" stroke="#f57f17" stroke-width="1.5"/>
  <text x="280" y="271" class="cell-num">31</text>
  <rect x="335" y="245" width="90" height="40" fill="#ef9a9a" stroke="#cc342d" stroke-width="2"/>
  <text x="380" y="271" class="cell-num">74</text>
  <rect x="435" y="245" width="90" height="40" fill="#ef9a9a" stroke="#cc342d" stroke-width="2"/>
  <text x="480" y="271" class="cell-num">120</text>
  <rect x="535" y="245" width="90" height="40" fill="#ef9a9a" stroke="#cc342d" stroke-width="2"/>
  <text x="580" y="271" class="cell-num">95</text>
  <text x="650" y="271" class="note">audit fires</text>

  <!-- Week 5/6 - never recovered -->
  <text x="20" y="315" class="axis">Week 5</text>
  <rect x="135" y="290" width="90" height="40" fill="#ffe082" stroke="#f57f17" stroke-width="1.5"/>
  <text x="180" y="316" class="cell-num">42</text>
  <rect x="235" y="290" width="90" height="40" fill="#ef9a9a" stroke="#cc342d" stroke-width="2"/>
  <text x="280" y="316" class="cell-num">78</text>
  <rect x="335" y="290" width="90" height="40" fill="#ef9a9a" stroke="#cc342d" stroke-width="2"/>
  <text x="380" y="316" class="cell-num">110</text>
  <rect x="435" y="290" width="90" height="40" fill="#ef9a9a" stroke="#cc342d" stroke-width="2"/>
  <text x="480" y="316" class="cell-num">63</text>
  <rect x="535" y="290" width="90" height="40" fill="#ef9a9a" stroke="#cc342d" stroke-width="2"/>
  <text x="580" y="316" class="cell-num">140</text>
  <text x="650" y="316" class="note">spaceship lands</text>

  <!-- Legend swatches -->
  <rect x="135" y="345" width="20" height="18" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="160" y="360" class="legend">≤20 (clean)</text>
  <rect x="270" y="345" width="20" height="18" fill="#ffe082" stroke="#f57f17" stroke-width="1.5"/>
  <text x="295" y="360" class="legend">21-50 (check)</text>
  <rect x="410" y="345" width="20" height="18" fill="#ef9a9a" stroke="#cc342d" stroke-width="2"/>
  <text x="435" y="360" class="legend">>50 (audit fires)</text>
</svg>
