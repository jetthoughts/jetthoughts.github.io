<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" role="img" aria-labelledby="title desc" font-family="Patrick Hand, Caveat, Comic Sans MS, cursive">
  <title id="title">12-month true cost: $25/hr cheap freelancer vs $40/hr framework-experienced engineer</title>
  <desc id="desc">Two stacked-cost columns. Left column shows a $25/hr cheap hire that compounds to $58,500 over 12 months once rebuild, agency rescue, and lost runway are added. Right column shows a $40/hr Rails-experienced engineer that stays at $38,400 with no rebuild required.</desc>

  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#cc342d" stroke-width="2" opacity="0.45"/>
    </pattern>
    <filter id="rough" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="2"/>
      <feDisplacementMap in="SourceGraphic" scale="1.3"/>
    </filter>
  </defs>

  <rect width="900" height="540" fill="#fffdf8"/>

  <!-- Header -->
  <text x="450" y="44" text-anchor="middle" font-size="28" fill="#1a1a1a">12-month true cost: cheap vs framework-experienced</text>
  <text x="450" y="72" text-anchor="middle" font-size="16" fill="#555">$25/hr (spaghetti) vs $40/hr (Rails) - 30 hrs/wk for 52 weeks</text>

  <!-- Left column: $25/hr cheap hire -->
  <g filter="url(#rough)">
    <rect x="80" y="200" width="280" height="280" fill="#fff5f5" stroke="#cc342d" stroke-width="3"/>
  </g>
  <text x="220" y="180" text-anchor="middle" font-size="22" fill="#cc342d">$25/hr freelancer</text>
  <text x="220" y="200" text-anchor="middle" font-size="14" fill="#555">5 parallel projects, no Cursor, no review</text>

  <!-- Stacked bars left -->
  <rect x="120" y="430" width="200" height="50" fill="#ffd5d5" stroke="#cc342d" stroke-width="2"/>
  <text x="220" y="462" text-anchor="middle" font-size="15" fill="#1a1a1a">Base wages: $39,000</text>

  <rect x="120" y="380" width="200" height="50" fill="#ffb5b5" stroke="#cc342d" stroke-width="2"/>
  <text x="220" y="412" text-anchor="middle" font-size="15" fill="#1a1a1a">Rebuild (month 7): $14,000</text>

  <rect x="120" y="340" width="200" height="40" fill="#ff9595" stroke="#cc342d" stroke-width="2"/>
  <text x="220" y="366" text-anchor="middle" font-size="14" fill="#1a1a1a">Lost runway: $5,500</text>

  <rect x="120" y="220" width="200" height="120" fill="url(#hatch)" stroke="#cc342d" stroke-width="2"/>
  <text x="220" y="280" text-anchor="middle" font-size="17" fill="#cc342d">TOTAL: $58,500</text>
  <text x="220" y="305" text-anchor="middle" font-size="14" fill="#cc342d">+ 4 months of lost product</text>

  <!-- Right column: $40/hr Rails engineer -->
  <g filter="url(#rough)">
    <rect x="540" y="270" width="280" height="210" fill="#f0fff5" stroke="#2e7d32" stroke-width="3"/>
  </g>
  <text x="680" y="180" text-anchor="middle" font-size="22" fill="#2e7d32">$40/hr Rails engineer</text>
  <text x="680" y="200" text-anchor="middle" font-size="14" fill="#555">7 yrs framework experience, Cursor user, PR review</text>

  <rect x="580" y="430" width="200" height="50" fill="#d5f0db" stroke="#2e7d32" stroke-width="2"/>
  <text x="680" y="462" text-anchor="middle" font-size="15" fill="#1a1a1a">Base wages: $62,400</text>

  <rect x="580" y="380" width="200" height="50" fill="#b5e0c0" stroke="#2e7d32" stroke-width="2"/>
  <text x="680" y="412" text-anchor="middle" font-size="15" fill="#1a1a1a">Fractional CTO review: $6,000</text>

  <!-- No rebuild line -->
  <rect x="580" y="330" width="200" height="50" fill="#95d0a8" stroke="#2e7d32" stroke-width="2"/>
  <text x="680" y="362" text-anchor="middle" font-size="14" fill="#1a1a1a">Rebuild cost: $0</text>

  <rect x="580" y="270" width="200" height="60" fill="#c5e8d0" stroke="#2e7d32" stroke-width="2"/>
  <text x="680" y="296" text-anchor="middle" font-size="17" fill="#2e7d32">TOTAL: $68,400</text>
  <text x="680" y="318" text-anchor="middle" font-size="14" fill="#2e7d32">Working product, no rescue</text>

  <!-- Arrow from cheap to expensive -->
  <path d="M 360 360 Q 450 320 540 360" stroke="#cc342d" stroke-width="3" fill="none" stroke-dasharray="6,4"/>
  <text x="450" y="345" text-anchor="middle" font-size="14" fill="#cc342d">cheap hire is $10K wages</text>
  <text x="450" y="360" text-anchor="middle" font-size="14" fill="#cc342d">+ $19,500 in rescue costs</text>

  <!-- Footer math -->
  <text x="450" y="515" text-anchor="middle" font-size="13" fill="#666">Assumes 30 hrs/wk × 52 wks. Rebuild cost is the median JetThoughts has seen across cheap-hire rescues 2024-2026.</text>
</svg>
