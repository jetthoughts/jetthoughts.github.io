<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" role="img" aria-labelledby="title desc" font-family="Patrick Hand, Caveat, Comic Sans MS, cursive">
  <title id="title">The three cheap-hire traps that compound to a $50K rebuild</title>
  <desc id="desc">Three hand-drawn warning panels, side by side. Trap 1: hourly-rate-only thinking. Trap 2: working-student or Werkstudent with the 20-hour cap. Trap 3: no Fractional CTO bridge.</desc>

  <defs>
    <filter id="rough" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="5"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
  </defs>

  <rect width="900" height="480" fill="#fffdf8"/>

  <!-- Header -->
  <text x="450" y="42" text-anchor="middle" font-size="26" fill="#1a1a1a">The three traps that turn a $10K hire into a $50K rebuild</text>
  <text x="450" y="68" text-anchor="middle" font-size="15" fill="#555">Each one survives on its own. Stack all three and you are the median JT rescue.</text>

  <!-- Trap 1 -->
  <g filter="url(#rough)">
    <rect x="40" y="110" width="260" height="320" fill="#fff5f5" stroke="#cc342d" stroke-width="3"/>
  </g>
  <circle cx="170" cy="160" r="28" fill="#cc342d"/>
  <text x="170" y="170" text-anchor="middle" font-size="28" fill="#fff" font-weight="bold">1</text>
  <text x="170" y="220" text-anchor="middle" font-size="20" fill="#cc342d">Hourly-rate trap</text>
  <text x="170" y="260" text-anchor="middle" font-size="14" fill="#1a1a1a">Pick the $25/hr freelancer</text>
  <text x="170" y="280" text-anchor="middle" font-size="14" fill="#1a1a1a">over the $40/hr engineer.</text>
  <text x="170" y="320" text-anchor="middle" font-size="13" fill="#666">5 parallel projects.</text>
  <text x="170" y="338" text-anchor="middle" font-size="13" fill="#666">No tests, no PR review.</text>
  <text x="170" y="356" text-anchor="middle" font-size="13" fill="#666">Spaghetti by month 4.</text>
  <text x="170" y="395" text-anchor="middle" font-size="14" fill="#cc342d" font-style="italic">Saves $2,400.</text>
  <text x="170" y="413" text-anchor="middle" font-size="14" fill="#cc342d" font-style="italic">Costs $14,000 in rebuild.</text>

  <!-- Trap 2 -->
  <g filter="url(#rough)">
    <rect x="320" y="110" width="260" height="320" fill="#fffbe6" stroke="#bf8a00" stroke-width="3"/>
  </g>
  <circle cx="450" cy="160" r="28" fill="#bf8a00"/>
  <text x="450" y="170" text-anchor="middle" font-size="28" fill="#fff" font-weight="bold">2</text>
  <text x="450" y="220" text-anchor="middle" font-size="20" fill="#bf8a00">Werkstudent trap</text>
  <text x="450" y="260" text-anchor="middle" font-size="14" fill="#1a1a1a">German working-student</text>
  <text x="450" y="280" text-anchor="middle" font-size="14" fill="#1a1a1a">capped at 20 hrs/wk by law.</text>
  <text x="450" y="320" text-anchor="middle" font-size="13" fill="#666">Disappears for exam blocks.</text>
  <text x="450" y="338" text-anchor="middle" font-size="13" fill="#666">Over-engineers for the resume.</text>
  <text x="450" y="356" text-anchor="middle" font-size="13" fill="#666">8-week gap at semester end.</text>
  <text x="450" y="395" text-anchor="middle" font-size="14" fill="#bf8a00" font-style="italic">Saves $1,500/mo.</text>
  <text x="450" y="413" text-anchor="middle" font-size="14" fill="#bf8a00" font-style="italic">Costs an MVP launch window.</text>

  <!-- Trap 3 -->
  <g filter="url(#rough)">
    <rect x="600" y="110" width="260" height="320" fill="#f5e9ff" stroke="#7c3aed" stroke-width="3"/>
  </g>
  <circle cx="730" cy="160" r="28" fill="#7c3aed"/>
  <text x="730" y="170" text-anchor="middle" font-size="28" fill="#fff" font-weight="bold">3</text>
  <text x="730" y="220" text-anchor="middle" font-size="20" fill="#7c3aed">No Fractional CTO</text>
  <text x="730" y="260" text-anchor="middle" font-size="14" fill="#1a1a1a">No senior reads the PRs.</text>
  <text x="730" y="280" text-anchor="middle" font-size="14" fill="#1a1a1a">Junior reviews itself.</text>
  <text x="730" y="320" text-anchor="middle" font-size="13" fill="#666">N+1 queries pile up.</text>
  <text x="730" y="338" text-anchor="middle" font-size="13" fill="#666">Auth bypass ships in PR #47.</text>
  <text x="730" y="356" text-anchor="middle" font-size="13" fill="#666">Bugs compound in silence.</text>
  <text x="730" y="395" text-anchor="middle" font-size="14" fill="#7c3aed" font-style="italic">Skips $400/wk.</text>
  <text x="730" y="413" text-anchor="middle" font-size="14" fill="#7c3aed" font-style="italic">Costs $30K in rebuild work.</text>

  <!-- Plus signs between traps -->
  <text x="310" y="285" text-anchor="middle" font-size="36" fill="#999">+</text>
  <text x="590" y="285" text-anchor="middle" font-size="36" fill="#999">+</text>

  <!-- Footer -->
  <text x="450" y="465" text-anchor="middle" font-size="13" fill="#666">Source: median JetThoughts cheap-hire rescue, Q1 2024 - Q1 2026.</text>
</svg>
