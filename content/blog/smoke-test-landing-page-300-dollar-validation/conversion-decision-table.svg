<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" role="img" aria-labelledby="cr-decision-title">
  <title id="cr-decision-title">Conversion-rate decision table - five bands from kill to suspicious-verify, with the right move per band</title>
  <defs>
    <style>
      .heading  { font-family: "Caveat", "Patrick Hand", cursive; font-size: 26px; fill: #1a1a1a; font-weight: 700; }
      .band-h   { font-family: "Caveat", "Patrick Hand", cursive; font-size: 22px; fill: #1a1a1a; font-weight: 700; }
      .band-d   { font-family: "Caveat", "Patrick Hand", cursive; font-size: 15px; fill: #1a1a1a; }
      .band-cr  { font-family: "Caveat", "Patrick Hand", cursive; font-size: 18px; fill: #cc342d; font-weight: 700; }
      .note     { font-family: "Caveat", "Patrick Hand", cursive; font-size: 14px; fill: #444; font-style: italic; }
      .kill     { fill: #ffe2e2; stroke: #cc342d; stroke-width: 2.5; stroke-linejoin: round; }
      .iterate  { fill: #fff3e0; stroke: #cc342d; stroke-width: 2.5; stroke-linejoin: round; }
      .promise  { fill: #fff5f5; stroke: #cc342d; stroke-width: 2.5; stroke-linejoin: round; }
      .strong   { fill: #fbe9ff; stroke: #a855f7; stroke-width: 2.5; stroke-linejoin: round; }
      .suspect  { fill: #e8e2ff; stroke: #a855f7; stroke-width: 2.5; stroke-linejoin: round; }
    </style>
  </defs>

  <text x="500" y="38" class="heading" text-anchor="middle">Conversion-rate decision table</text>
  <text x="500" y="62" class="note" text-anchor="middle">Email-signup CR from ≥300 paid visits, cold traffic, 5-7 day run.</text>

  <!-- Band 1: <3% Kill -->
  <rect x="40" y="90" width="920" height="70" class="kill" rx="10" transform="rotate(-0.1 500 125)"/>
  <text x="60" y="118" class="band-cr">&lt;3%</text>
  <text x="160" y="118" class="band-h">Kill or pivot</text>
  <text x="60" y="142" class="band-d">Hypothesis is wrong. Rewrite (different audience, mechanism, or outcome). Re-run Module 1 with the lowest-scoring Magic Lens as the focus.</text>

  <!-- Band 2: 3-5% Iterate -->
  <rect x="40" y="170" width="920" height="70" class="iterate" rx="10" transform="rotate(0.1 500 205)"/>
  <text x="60" y="198" class="band-cr">3-5%</text>
  <text x="160" y="198" class="band-h">Iterate the message</text>
  <text x="60" y="222" class="band-d">Second test with new headline OR new audience. Same product hypothesis, different framing. Do NOT change the page mid-test - run a fresh 5-day window.</text>

  <!-- Band 3: 6-10% Promising -->
  <rect x="40" y="250" width="920" height="70" class="promise" rx="10" transform="rotate(-0.1 500 285)"/>
  <text x="60" y="278" class="band-cr">6-10%</text>
  <text x="160" y="278" class="band-h">Promising</text>
  <text x="60" y="302" class="band-d">Move to Module 3 (interviews). Talk to the people who signed up - they are warm, they raised their hand, and they remember why.</text>

  <!-- Band 4: 10-20% Strong -->
  <rect x="40" y="330" width="920" height="70" class="strong" rx="10" transform="rotate(0.1 500 365)"/>
  <text x="60" y="358" class="band-cr">10-20%</text>
  <text x="160" y="358" class="band-h">Strong signal</text>
  <text x="60" y="382" class="band-d">Module 3 + Module 4 (Vibe PRD) in parallel. You have a hot audience. Do not slow down to "polish" the LP - capture more signups and start drafting product.</text>

  <!-- Band 5: >20% Suspicious -->
  <rect x="40" y="410" width="920" height="70" class="suspect" rx="10" transform="rotate(-0.1 500 445)"/>
  <text x="60" y="438" class="band-cr">&gt;20%</text>
  <text x="160" y="438" class="band-h">Suspicious - verify</text>
  <text x="60" y="462" class="band-d">Either hot market OR broken ad targeting. Run a second cold channel for 48 hours. If both convert &gt;15%, you have real demand. If one channel is high and the other crashes, targeting was the variable.</text>

  <!-- Bottom rule -->
  <rect x="40" y="495" width="920" height="35" class="promise" rx="10"/>
  <text x="500" y="518" class="band-h" text-anchor="middle">Lowest Magic Lens score in Module 1 = the part of the message most likely failing here.</text>
</svg>
