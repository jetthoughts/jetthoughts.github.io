<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="cohort-title">
  <title id="cohort-title">Cohort retention curves: four cohorts plotted, must-have inflection at the high segment</title>
  <defs>
    <style>
      .heading       { font-family: "Caveat", "Patrick Hand", cursive; font-size: 28px; fill: #1a1a1a; font-weight: 700; }
      .axis          { font-family: "Caveat", "Patrick Hand", cursive; font-size: 17px; fill: #1a1a1a; font-weight: 600; }
      .label         { font-family: "Caveat", "Patrick Hand", cursive; font-size: 17px; fill: #1a1a1a; font-weight: 700; }
      .note          { font-family: "Caveat", "Patrick Hand", cursive; font-size: 14px; fill: #444; font-style: italic; }
      .threshold     { font-family: "Caveat", "Patrick Hand", cursive; font-size: 18px; fill: #cc342d; font-weight: 700; }
      .cohort-bad    { stroke: #cc342d; stroke-width: 3; fill: none; }
      .cohort-mid    { stroke: #b8860b; stroke-width: 3; fill: none; }
      .cohort-good   { stroke: #a855f7; stroke-width: 3; fill: none; stroke-dasharray: none; }
      .cohort-best   { stroke: #2e7d32; stroke-width: 4; fill: none; }
      .threshold-line{ stroke: #cc342d; stroke-width: 2.5; stroke-dasharray: 8 4; }
      .grid          { stroke: #ccc; stroke-width: 1; }
    </style>
  </defs>

  <text x="450" y="36" class="heading" text-anchor="middle">Cohort retention curves: four signups groups, four shapes</text>
  <text x="450" y="64" class="note" text-anchor="middle">3-person team segment retains at 70% by week 4. Solo segment retains at 8%. Same product, two answers.</text>

  <!-- Y axis -->
  <line x1="120" y1="120" x2="120" y2="450" stroke="#1a1a1a" stroke-width="2"/>
  <text x="105" y="125" class="axis" text-anchor="end">100%</text>
  <text x="105" y="217" class="axis" text-anchor="end">75%</text>
  <text x="105" y="305" class="threshold" text-anchor="end">40%</text>
  <text x="105" y="385" class="axis" text-anchor="end">20%</text>
  <text x="105" y="455" class="axis" text-anchor="end">0%</text>
  <text x="60" y="290" class="label" transform="rotate(-90 60 290)">% retained</text>

  <!-- 40% threshold line -->
  <line x1="120" y1="305" x2="780" y2="305" class="threshold-line"/>
  <text x="785" y="300" class="threshold">40% must-have line</text>

  <!-- Light grid lines -->
  <line x1="120" y1="217" x2="780" y2="217" class="grid"/>
  <line x1="120" y1="385" x2="780" y2="385" class="grid"/>

  <!-- X axis -->
  <line x1="120" y1="450" x2="780" y2="450" stroke="#1a1a1a" stroke-width="2"/>
  <text x="170" y="475" class="axis" text-anchor="middle">Day 1</text>
  <text x="335" y="475" class="axis" text-anchor="middle">Day 7</text>
  <text x="500" y="475" class="axis" text-anchor="middle">Day 14</text>
  <text x="665" y="475" class="axis" text-anchor="middle">Day 30</text>
  <text x="450" y="500" class="label" text-anchor="middle">Days since signup</text>

  <!-- Cohort A: 3-person teams (best, retains above must-have line) -->
  <path d="M 170 130 Q 250 145 335 175 Q 420 195 500 215 Q 580 230 665 245" class="cohort-best"/>
  <circle cx="170" cy="130" r="5" fill="#2e7d32"/>
  <circle cx="335" cy="175" r="5" fill="#2e7d32"/>
  <circle cx="500" cy="215" r="5" fill="#2e7d32"/>
  <circle cx="665" cy="245" r="5" fill="#2e7d32"/>
  <text x="685" y="248" class="label" fill="#2e7d32">3-person teams: 70%</text>

  <!-- Cohort B: small agencies (mid) -->
  <path d="M 170 135 Q 250 175 335 230 Q 420 270 500 300 Q 580 320 665 335" class="cohort-mid"/>
  <circle cx="665" cy="335" r="5" fill="#b8860b"/>
  <text x="685" y="338" class="label" fill="#b8860b">Small agencies: 32%</text>

  <!-- Cohort C: freelancers (low) -->
  <path d="M 170 138 Q 250 220 335 295 Q 420 350 500 390 Q 580 410 665 420" class="cohort-bad"/>
  <circle cx="665" cy="420" r="5" fill="#cc342d"/>
  <text x="685" y="423" class="label" fill="#cc342d">Freelancers: 12%</text>

  <!-- Cohort D: solo founders (worst) -->
  <path d="M 170 140 Q 220 280 290 380 Q 380 430 500 442 Q 580 446 665 448" class="cohort-bad" style="opacity:0.6"/>
  <circle cx="665" cy="448" r="5" fill="#cc342d" opacity="0.7"/>
  <text x="685" y="451" class="note" fill="#cc342d">Solo founders: 8%</text>

  <!-- Inflection annotation -->
  <text x="540" y="155" class="label">Must-have</text>
  <text x="540" y="173" class="label">inflection here</text>
  <path d="M 575 175 Q 600 200 620 215" stroke="#2e7d32" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L0,10 L10,5 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <!-- Bottom callout -->
  <rect x="120" y="525" width="660" height="28" fill="none"/>
  <text x="450" y="544" class="note" text-anchor="middle">Same product. Four cohorts. The 3-person team segment is your real customer; the rest were the wrong audience.</text>
</svg>
