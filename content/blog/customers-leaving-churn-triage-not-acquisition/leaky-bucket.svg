<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" role="img" aria-labelledby="bucket-title">
  <title id="bucket-title">The leaky bucket: 32 paying users, 21 churn, $4,800 in ads buys 3 net new</title>
  <defs>
    <style>
      .heading       { font-family: "Caveat", "Patrick Hand", cursive; font-size: 28px; fill: #1a1a1a; font-weight: 700; }
      .label         { font-family: "Caveat", "Patrick Hand", cursive; font-size: 19px; fill: #1a1a1a; font-weight: 700; }
      .note          { font-family: "Caveat", "Patrick Hand", cursive; font-size: 16px; fill: #444; font-style: italic; }
      .stat          { font-family: "Caveat", "Patrick Hand", cursive; font-size: 26px; fill: #cc342d; font-weight: 700; }
      .stat-good     { font-family: "Caveat", "Patrick Hand", cursive; font-size: 26px; fill: #a855f7; font-weight: 700; }
      .bucket        { fill: #fff5f5; stroke: #1a1a1a; stroke-width: 3; stroke-linejoin: round; }
      .water         { fill: #cc342d; opacity: 0.55; }
      .arrow         { stroke: #1a1a1a; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .drip          { fill: #cc342d; opacity: 0.85; }
      .drop-in       { fill: #a855f7; opacity: 0.85; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L0,10 L10,5 z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <text x="450" y="38" class="heading" text-anchor="middle">$4,800 in Meta ads. $1,400 in dev support.</text>
  <text x="450" y="68" class="heading" text-anchor="middle">Net new paid users at month-end: 3.</text>
  <text x="450" y="96" class="note" text-anchor="middle">More acquisition into a leaky bucket = $2,066 spend per net new user. The fix is not the ads.</text>

  <!-- Drops in (top funnel) -->
  <text x="170" y="155" class="label" text-anchor="middle">New signups</text>
  <text x="170" y="178" class="stat-good" text-anchor="middle">+24 / month</text>
  <circle cx="125" cy="210" r="8" class="drop-in"/>
  <circle cx="155" cy="220" r="8" class="drop-in"/>
  <circle cx="185" cy="208" r="8" class="drop-in"/>
  <circle cx="215" cy="222" r="8" class="drop-in"/>

  <!-- Bucket -->
  <path d="M 280 240 L 320 480 L 580 480 L 620 240 Z" class="bucket"/>
  <path d="M 305 380 L 335 470 L 565 470 L 595 380 Z" class="water"/>
  <text x="450" y="360" class="label" text-anchor="middle">In the bucket</text>
  <text x="450" y="395" class="stat" text-anchor="middle">32 paying users</text>
  <text x="450" y="420" class="note" text-anchor="middle">$29 / month each</text>
  <text x="450" y="442" class="note" text-anchor="middle">65% will churn in 30 days</text>

  <!-- Drip out (left side) -->
  <ellipse cx="295" cy="430" rx="6" ry="9" class="drip"/>
  <ellipse cx="290" cy="455" rx="6" ry="9" class="drip"/>
  <ellipse cx="285" cy="478" rx="6" ry="9" class="drip"/>
  <ellipse cx="280" cy="500" rx="6" ry="9" class="drip"/>
  <text x="180" y="465" class="label" text-anchor="end">Churn out</text>
  <text x="180" y="490" class="stat" text-anchor="end">-21 / month</text>

  <!-- Drip out (right side) -->
  <ellipse cx="605" cy="430" rx="6" ry="9" class="drip"/>
  <ellipse cx="610" cy="455" rx="6" ry="9" class="drip"/>
  <ellipse cx="615" cy="478" rx="6" ry="9" class="drip"/>
  <ellipse cx="620" cy="500" rx="6" ry="9" class="drip"/>
  <text x="720" y="465" class="label">Workflow gaps</text>
  <text x="720" y="490" class="note">No 7-day return</text>
  <text x="720" y="510" class="note">Wrong segment</text>

  <!-- The arithmetic -->
  <rect x="100" y="270" width="180" height="70" rx="10" fill="#fff5f5" stroke="#cc342d" stroke-width="2.5"/>
  <text x="190" y="295" class="label" text-anchor="middle">+24 - 21 = 3</text>
  <text x="190" y="320" class="note" text-anchor="middle">Net new this month</text>

  <!-- Arrow pointing back to bucket -->
  <path d="M 280 305 Q 310 290 360 270" class="arrow"/>

  <!-- Bottom callout -->
  <rect x="80" y="510" width="740" height="22" fill="none"/>
  <text x="450" y="528" class="note" text-anchor="middle">Stop the ads. Run the 90-minute cohort triage. Decide: fix the product, change the segment, or kill the SKU.</text>
</svg>
