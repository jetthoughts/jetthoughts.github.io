<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="jargon-title">
  <title id="jargon-title">Jargon Translator: What Your Dev Shop Says vs What It Usually Means</title>
  <defs>
    <style>
      .title { font-family: "Caveat", "Patrick Hand", "Comic Sans MS", cursive; font-size: 28px; fill: #1a1a1a; font-weight: 700; }
      .term  { font-family: "Caveat", "Patrick Hand", "Comic Sans MS", cursive; font-size: 22px; fill: #1a1a1a; }
      .mean  { font-family: "Caveat", "Patrick Hand", "Comic Sans MS", cursive; font-size: 20px; fill: #1a1a1a; }
      .small { font-family: "Caveat", "Patrick Hand", "Comic Sans MS", cursive; font-size: 18px; fill: #1a1a1a; }
      .box-l { fill: #fff5f5; stroke: #cc342d; stroke-width: 2.5; stroke-linejoin: round; stroke-linecap: round; }
      .box-r { fill: #f5f0ff; stroke: #a855f7; stroke-width: 2.5; stroke-linejoin: round; stroke-linecap: round; }
      .arrow { stroke: #1a1a1a; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .caption { font-family: "Caveat", "Patrick Hand", "Comic Sans MS", cursive; font-size: 18px; fill: #666; font-style: italic; }
    </style>
  </defs>

  <text x="200" y="38" class="title" text-anchor="middle">WHAT THEY SAY</text>
  <text x="700" y="38" class="title" text-anchor="middle">WHAT IT USUALLY MEANS</text>

  <rect x="20" y="60" width="360" height="80" rx="10" class="box-l" transform="rotate(-0.5 200 100)"/>
  <text x="200" y="95" class="term" text-anchor="middle">"We're refactoring</text>
  <text x="200" y="120" class="term" text-anchor="middle">the order flow"</text>
  <path class="arrow" d="M 390 100 L 510 100"/>
  <path class="arrow" d="M 502 94 L 510 100 L 502 106"/>
  <rect x="520" y="60" width="360" height="80" rx="10" class="box-r" transform="rotate(0.4 700 100)"/>
  <text x="700" y="92" class="mean" text-anchor="middle">Rewriting code we shipped before,</text>
  <text x="700" y="117" class="mean" text-anchor="middle">on your dime, calling it tidy-up</text>

  <rect x="20" y="155" width="360" height="80" rx="10" class="box-l" transform="rotate(0.4 200 195)"/>
  <text x="200" y="190" class="term" text-anchor="middle">"We need a</text>
  <text x="200" y="215" class="term" text-anchor="middle">Docker upgrade"</text>
  <path class="arrow" d="M 390 195 L 510 195"/>
  <path class="arrow" d="M 502 189 L 510 195 L 502 201"/>
  <rect x="520" y="155" width="360" height="80" rx="10" class="box-r" transform="rotate(-0.3 700 195)"/>
  <text x="700" y="187" class="mean" text-anchor="middle">Something on the server broke;</text>
  <text x="700" y="212" class="mean" text-anchor="middle">we can't reproduce locally</text>

  <rect x="20" y="250" width="360" height="80" rx="10" class="box-l" transform="rotate(-0.4 200 290)"/>
  <text x="200" y="285" class="term" text-anchor="middle">"There's a lot of</text>
  <text x="200" y="310" class="term" text-anchor="middle">tech debt to pay down"</text>
  <path class="arrow" d="M 390 290 L 510 290"/>
  <path class="arrow" d="M 502 284 L 510 290 L 502 296"/>
  <rect x="520" y="250" width="360" height="80" rx="10" class="box-r" transform="rotate(0.3 700 290)"/>
  <text x="700" y="282" class="mean" text-anchor="middle">We wrote it badly. Pay us to fix</text>
  <text x="700" y="307" class="mean" text-anchor="middle">what you already paid us to write</text>

  <rect x="20" y="345" width="360" height="80" rx="10" class="box-l" transform="rotate(0.4 200 385)"/>
  <text x="200" y="380" class="term" text-anchor="middle">"Let's just ship</text>
  <text x="200" y="405" class="term" text-anchor="middle">the MVP first"</text>
  <path class="arrow" d="M 390 385 L 510 385"/>
  <path class="arrow" d="M 502 379 L 510 385 L 502 391"/>
  <rect x="520" y="345" width="360" height="80" rx="10" class="box-r" transform="rotate(-0.3 700 385)"/>
  <text x="700" y="377" class="mean" text-anchor="middle">The cheapest scope we can finish</text>
  <text x="700" y="402" class="mean" text-anchor="middle">inside the budget you have left</text>

  <rect x="20" y="440" width="360" height="80" rx="10" class="box-l" transform="rotate(-0.3 200 480)"/>
  <text x="200" y="475" class="term" text-anchor="middle">"We need to fix</text>
  <text x="200" y="500" class="term" text-anchor="middle">the architecture"</text>
  <path class="arrow" d="M 390 480 L 510 480"/>
  <path class="arrow" d="M 502 474 L 510 480 L 502 486"/>
  <rect x="520" y="440" width="360" height="80" rx="10" class="box-r" transform="rotate(0.4 700 480)"/>
  <text x="700" y="472" class="mean" text-anchor="middle">We want resume-building tech</text>
  <text x="700" y="497" class="mean" text-anchor="middle">the senior dev hasn't tried yet</text>

  <text x="450" y="575" class="caption" text-anchor="middle">Five words. Five invoices. Bring the question column to your next standup.</text>
</svg>
