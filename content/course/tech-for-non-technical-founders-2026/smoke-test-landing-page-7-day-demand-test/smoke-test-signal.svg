<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" fill="none" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="600" height="180" rx="8" fill="#f8f9fa"/>
  <!-- Ad traffic arrows -->
  <rect x="30" y="60" width="80" height="60" rx="6" fill="#e8f4f8" stroke="#0277bd" stroke-width="1.5"/>
  <text x="70" y="85" text-anchor="middle" font-size="10" fill="#333">Meta / Google</text>
  <text x="70" y="100" text-anchor="middle" font-size="10" fill="#333">Ads →</text>
  <!-- Landing page -->
  <rect x="200" y="40" width="120" height="100" rx="6" fill="#fff5f5" stroke="#cc342d" stroke-width="1.5"/>
  <text x="260" y="85" text-anchor="middle" font-size="11" fill="#333">Landing</text>
  <text x="260" y="100" text-anchor="middle" font-size="11" fill="#333">Page</text>
  <text x="260" y="125" text-anchor="middle" font-size="9" fill="#666">CTA + Form</text>
  <!-- Tracking dashboard -->
  <rect x="410" y="40" width="100" height="45" rx="6" fill="#f0f9f0" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="460" y="60" text-anchor="middle" font-size="10" fill="#333">Tracking</text>
  <text x="460" y="74" text-anchor="middle" font-size="9" fill="#666">Page views: 300</text>
  <text x="460" y="84" text-anchor="middle" font-size="9" fill="#666">CTA clicks: 24</text>
  <!-- Decision -->
  <rect x="520" y="40" width="70" height="45" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="555" y="68" text-anchor="middle" font-size="9" fill="#333">Go / Iterate</text>
  <text x="555" y="80" text-anchor="middle" font-size="9" fill="#333">/ Kill</text>
  <!-- Arrows -->
  <line x1="110" y1="90" x2="198" y2="90" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="320" y1="70" x2="408" y2="62" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="510" y1="62" x2="518" y2="62" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
  </defs>
</svg>
