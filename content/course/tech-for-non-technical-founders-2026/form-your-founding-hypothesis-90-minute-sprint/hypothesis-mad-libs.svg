  <text x="90" y="53" text-anchor="middle" font-size="9" fill="#333">customer</text>
  <text x="135" y="55" font-size="10" fill="#555">solve</text>
  <rect x="175" y="38" width="80" height="22" rx="4" fill="#fff5f5" stroke="#cc342d" stroke-width="1"/>
  <text x="215" y="53" text-anchor="middle" font-size="9" fill="#333">problem</text>
  <text x="260" y="55" font-size="10" fill="#555">with</text>
