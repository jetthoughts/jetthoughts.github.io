<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" fill="none" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="500" height="120" rx="8" fill="#f8f9fa"/>
  <text x="250" y="30" text-anchor="middle" font-size="11" fill="#555">If we help</text>
