<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 190" role="img" aria-labelledby="madlibs-title">
  <title id="madlibs-title">The founding-hypothesis Mad Libs sentence with five blanks: If we help [customer] solve [problem] with [approach], they'll choose it over [competition] because [differentiation].</title>
  <desc>Five fill-in-the-blank pills stitched into one sentence. Three red pills name the customer, the problem, and the approach; two purple pills name the competition and the differentiation. Caption: five blanks, one sentence, no vagueness allowed.</desc>
  <defs>
    <style>
      .h    { font-family: "Caveat", "Patrick Hand", "Comic Sans MS", cursive; }
      .join { font-size: 21px; fill: #555; }
      .pill { font-size: 20px; font-weight: 700; fill: #1a1a1a; }
      .cap  { font-size: 18px; fill: #888; font-style: italic; }
      .p-r  { fill: #fff5f5; stroke: #cc342d; stroke-width: 2; stroke-linejoin: round; }
      .p-p  { fill: #fbe9ff; stroke: #a855f7; stroke-width: 2; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- Line 1: If we help [customer] solve [problem] with [approach] -->
  <text x="18" y="54" class="h join">If we help</text>
  <g transform="rotate(-0.8 202 47)">
    <rect x="152" y="32" width="100" height="30" rx="8" class="p-r"/>
    <text x="202" y="54" text-anchor="middle" class="h pill">customer</text>
  </g>
  <text x="266" y="54" class="h join">solve</text>
  <g transform="rotate(0.7 378 47)">
    <rect x="330" y="32" width="96" height="30" rx="8" class="p-r"/>
    <text x="378" y="54" text-anchor="middle" class="h pill">problem</text>
  </g>
  <text x="440" y="54" class="h join">with</text>
  <g transform="rotate(-0.6 553 47)">
    <rect x="500" y="32" width="106" height="30" rx="8" class="p-r"/>
    <text x="553" y="54" text-anchor="middle" class="h pill">approach</text>
  </g>

  <!-- Line 2: they'll choose it over [competition] because [differentiation] -->
  <text x="18" y="114" class="h join">they'll choose it over</text>
  <g transform="rotate(0.6 340 107)">
    <rect x="280" y="92" width="120" height="30" rx="8" class="p-p"/>
    <text x="340" y="114" text-anchor="middle" class="h pill">competition</text>
  </g>
  <text x="414" y="114" class="h join">because</text>
  <g transform="rotate(-0.7 584 107)">
    <rect x="516" y="92" width="136" height="30" rx="8" class="p-p"/>
    <text x="584" y="114" text-anchor="middle" class="h pill">differentiation</text>
  </g>

  <!-- Caption -->
  <text x="340" y="166" text-anchor="middle" class="h cap">Five blanks. One sentence. No vagueness allowed.</text>
</svg>
