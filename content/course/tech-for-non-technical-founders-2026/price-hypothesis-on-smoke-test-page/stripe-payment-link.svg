<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" fill="none">
  <rect width="600" height="160" rx="8" fill="#f8f9fa"/>
  <!-- Stripe dashboard -->
  <rect x="20" y="50" width="100" height="60" rx="6" fill="#635bff" opacity="0.1" stroke="#635bff" stroke-width="1.5"/>
  <text x="70" y="75" text-anchor="middle" font-size="10" fill="#333">Stripe</text>
  <text x="70" y="90" text-anchor="middle" font-size="10" fill="#333">Dashboard</text>
  <text x="70" y="105" text-anchor="middle" font-size="8" fill="#666">Payment Link</text>
  <!-- Arrow to landing page -->
  <line x1="120" y1="80" x2="208" y2="80" stroke="#666" stroke-width="1" marker-end="url(#arrow2)"/>
  <!-- Landing page -->
  <rect x="210" y="45" width="120" height="70" rx="6" fill="#fff5f5" stroke="#cc342d" stroke-width="1.5"/>
  <text x="270" y="72" text-anchor="middle" font-size="10" fill="#333">Landing Page</text>
  <text x="270" y="88" text-anchor="middle" font-size="9" fill="#666">CTA: "Reserve</text>
  <text x="270" y="100" text-anchor="middle" font-size="9" fill="#666">access — $97"</text>
  <!-- Arrow to Stripe checkout -->
  <line x1="330" y1="80" x2="418" y2="80" stroke="#666" stroke-width="1" marker-end="url(#arrow2)"/>
  <!-- Stripe checkout -->
  <rect x="420" y="45" width="100" height="70" rx="6" fill="#e8f4f8" stroke="#0277bd" stroke-width="1.5"/>
  <text x="470" y="72" text-anchor="middle" font-size="10" fill="#333">Stripe</text>
  <text x="470" y="88" text-anchor="middle" font-size="10" fill="#333">Checkout</text>
  <text x="470" y="104" text-anchor="middle" font-size="8" fill="#666">Card entry →</text>
  <!-- Thank you -->
  <rect x="540" y="55" width="50" height="50" rx="6" fill="#f0f9f0" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="565" y="78" text-anchor="middle" font-size="9" fill="#333">Thank</text>
  <text x="565" y="92" text-anchor="middle" font-size="9" fill="#333">You</text>
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
  </defs>
</svg>
