<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" role="img" aria-labelledby="find10-title">
  <title id="find10-title">The find-10 journey: from your Ch 1.1 hypothesis through four steps to ten booked interviews.</title>
  <desc>A left-to-right strip of six cards. It starts with your hypothesis from Chapter 1.1, then runs four numbered steps: step 1 AI ICP map, paste your three sentences into Claude; step 2 read where they complain; step 3 build the 30-name list; step 4 write to each one personally. It ends with ten interviews booked on the calendar. Arrows connect each card to the next.</desc>
  <defs>
    <style>
      .h     { font-family: "Caveat", "Patrick Hand", "Comic Sans MS", cursive; }
      .title { font-size: 27px; font-weight: 700; fill: #1a1a1a; }
      .sub   { font-size: 16px; fill: #666; font-style: italic; }
      .num   { font-size: 18px; font-weight: 700; fill: #fff; }
      .ttl   { font-size: 18px; font-weight: 700; fill: #1a1a1a; }
      .out   { font-size: 14px; fill: #555; font-style: italic; }
      .role  { font-size: 14px; fill: #555; font-style: italic; }
      .cstart { fill: #faf7f2; stroke: #999; stroke-width: 2.5; stroke-dasharray: 6 5; }
      .cstep  { fill: #fff5f5; stroke: #cc342d; stroke-width: 2.5; }
      .cend   { fill: #f0f9f0; stroke: #2e7d32; stroke-width: 2.5; }
      .dstep  { fill: #cc342d; }
    </style>
    <marker id="fj" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#999"/>
    </marker>
  </defs>

  <!-- Header -->
  <text x="480" y="34" text-anchor="middle" class="h title">The find-10 journey</text>
  <text x="480" y="58" text-anchor="middle" class="h sub">Read where they already complain, then write to those specific people.</text>

  <!-- Start: Hypothesis -->
  <g transform="translate(8,90) rotate(-0.5 74 78)">
    <rect width="148" height="150" rx="12" class="cstart"/>
    <text x="74" y="58" text-anchor="middle" class="h ttl">Hypothesis</text>
    <text x="74" y="80" text-anchor="middle" class="h ttl">from Ch 1.1</text>
    <text x="74" y="112" text-anchor="middle" class="h role">your starting</text>
    <text x="74" y="130" text-anchor="middle" class="h role">bet</text>
  </g>

  <!-- Step 1 -->
  <g transform="translate(168,90) rotate(0.5 74 78)">
    <rect width="148" height="150" rx="12" class="cstep"/>
    <circle cx="74" cy="30" r="15" class="dstep"/>
    <text x="74" y="36" text-anchor="middle" class="h num">1</text>
    <text x="74" y="72" text-anchor="middle" class="h ttl">AI ICP map</text>
    <text x="74" y="106" text-anchor="middle" class="h out">paste into</text>
    <text x="74" y="124" text-anchor="middle" class="h out">Claude</text>
  </g>

  <!-- Step 2 -->
  <g transform="translate(328,90) rotate(-0.4 74 78)">
    <rect width="148" height="150" rx="12" class="cstep"/>
    <circle cx="74" cy="30" r="15" class="dstep"/>
    <text x="74" y="36" text-anchor="middle" class="h num">2</text>
    <text x="74" y="72" text-anchor="middle" class="h ttl">Read the</text>
    <text x="74" y="94" text-anchor="middle" class="h ttl">threads</text>
    <text x="74" y="124" text-anchor="middle" class="h out">where they complain</text>
  </g>

  <!-- Step 3 -->
  <g transform="translate(488,90) rotate(0.4 74 78)">
    <rect width="148" height="150" rx="12" class="cstep"/>
    <circle cx="74" cy="30" r="15" class="dstep"/>
    <text x="74" y="36" text-anchor="middle" class="h num">3</text>
    <text x="74" y="72" text-anchor="middle" class="h ttl">30-name</text>
    <text x="74" y="94" text-anchor="middle" class="h ttl">list</text>
    <text x="74" y="124" text-anchor="middle" class="h out">named people only</text>
  </g>

  <!-- Step 4 -->
  <g transform="translate(648,90) rotate(-0.5 74 78)">
    <rect width="148" height="150" rx="12" class="cstep"/>
    <circle cx="74" cy="30" r="15" class="dstep"/>
    <text x="74" y="36" text-anchor="middle" class="h num">4</text>
    <text x="74" y="72" text-anchor="middle" class="h ttl">Write each</text>
    <text x="74" y="94" text-anchor="middle" class="h ttl">personally</text>
    <text x="74" y="124" text-anchor="middle" class="h out">name their post</text>
  </g>

  <!-- End: 10 interviews -->
  <g transform="translate(808,90) rotate(0.5 74 78)">
    <rect width="148" height="150" rx="12" class="cend"/>
    <text x="74" y="58" text-anchor="middle" class="h ttl">10 interviews</text>
    <text x="74" y="80" text-anchor="middle" class="h ttl">booked</text>
    <text x="74" y="112" text-anchor="middle" class="h role">on the</text>
    <text x="74" y="130" text-anchor="middle" class="h role">calendar</text>
  </g>

  <!-- Arrows -->
  <path d="M 158 165 L 166 165" stroke="#999" stroke-width="2.25" fill="none" marker-end="url(#fj)"/>
  <path d="M 318 165 L 326 165" stroke="#999" stroke-width="2.25" fill="none" marker-end="url(#fj)"/>
  <path d="M 478 165 L 486 165" stroke="#999" stroke-width="2.25" fill="none" marker-end="url(#fj)"/>
  <path d="M 638 165 L 646 165" stroke="#999" stroke-width="2.25" fill="none" marker-end="url(#fj)"/>
  <path d="M 798 165 L 806 165" stroke="#999" stroke-width="2.25" fill="none" marker-end="url(#fj)"/>
</svg>
