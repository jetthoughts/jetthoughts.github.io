<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 340" role="img" aria-labelledby="pipeline-title">
  <title id="pipeline-title">5-module course pipeline: Hypothesis → Validate → Design → Build → First Paying Customer</title>
  <defs>
    <style>
      .card-title   { font-family: "Caveat", "Patrick Hand", cursive; font-size: 22px; fill: #1a1a1a; font-weight: 700; }
      .card-label   { font-family: "Caveat", "Patrick Hand", cursive; font-size: 15px; fill: #555; }
      .card-artifact{ font-family: "Caveat", "Patrick Hand", cursive; font-size: 14px; fill: #444; font-style: italic; }
      .arrow-label  { font-family: "Caveat", "Patrick Hand", cursive; font-size: 18px; fill: #777; font-weight: 700; }
      .page-title   { font-family: "Caveat", "Patrick Hand", cursive; font-size: 28px; fill: #1a1a1a; font-weight: 700; }
      .page-sub     { font-family: "Caveat", "Patrick Hand", cursive; font-size: 16px; fill: #666; font-style: italic; }
      .card-1 { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2.5; }
      .card-2 { fill: #ecfeff; stroke: #0891b2; stroke-width: 2.5; }
      .card-3 { fill: #fffbeb; stroke: #d97706; stroke-width: 2.5; }
      .card-4 { fill: #fff5f5; stroke: #cc342d; stroke-width: 2.5; }
      .card-5 { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2.5; }
    </style>
    <filter id="rough" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="2.5"/>
    </filter>
    <filter id="rough-arrow" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="2" seed="12"/>
      <feDisplacementMap in="SourceGraphic" scale="1.8"/>
    </filter>
  </defs>

  <rect width="1100" height="340" fill="#fafaf7"/>

  <!-- Title -->
  <text x="550" y="38" class="page-title" text-anchor="middle">The 5-Module Pipeline</text>
  <text x="550" y="62" class="page-sub" text-anchor="middle">Each module's output is the next module's input - from rough idea to signed paid pilot</text>

  <!-- Card 1: Module 1 -->
  <rect x="20" y="85" width="180" height="230" rx="10" class="card-1" filter="url(#rough)"/>
  <text x="110" y="115" class="card-title" text-anchor="middle">Module 1</text>
  <text x="110" y="140" class="card-label" text-anchor="middle" font-weight="bold">Hypothesis</text>
  <text x="110" y="160" class="card-label" text-anchor="middle">&amp; Smoke Test</text>
  <line x1="40" y1="175" x2="180" y2="175" stroke="#4f46e5" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  <text x="110" y="196" class="card-label" text-anchor="middle">~7 days</text>
  <line x1="40" y1="212" x2="180" y2="212" stroke="#4f46e5" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  <text x="110" y="234" class="card-artifact" text-anchor="middle">Artifact:</text>
  <text x="110" y="254" class="card-artifact" text-anchor="middle">Hypothesis +</text>
  <text x="110" y="272" class="card-artifact" text-anchor="middle">Smoke Test</text>
  <text x="110" y="302" class="card-label" text-anchor="middle" fill="#4f46e5" font-weight="bold">STAGE 1</text>

  <!-- Arrow 1→2 -->
  <g filter="url(#rough-arrow)">
    <line x1="210" y1="200" x2="260" y2="200" stroke="#777" stroke-width="2.5"/>
    <polygon points="258,192 272,200 258,208" fill="#777"/>
  </g>
  <text x="238" y="190" class="arrow-label" text-anchor="middle">→</text>

  <!-- Card 2: Module 2 -->
  <rect x="230" y="85" width="180" height="230" rx="10" class="card-2" filter="url(#rough)"/>
  <text x="320" y="115" class="card-title" text-anchor="middle">Module 2</text>
  <text x="320" y="140" class="card-label" text-anchor="middle" font-weight="bold">Validate the</text>
  <text x="320" y="160" class="card-label" text-anchor="middle">Problem</text>
  <line x1="250" y1="175" x2="390" y2="175" stroke="#0891b2" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  <text x="320" y="196" class="card-label" text-anchor="middle">~2-3 weeks</text>
  <line x1="250" y1="212" x2="390" y2="212" stroke="#0891b2" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  <text x="320" y="234" class="card-artifact" text-anchor="middle">Artifact:</text>
  <text x="320" y="254" class="card-artifact" text-anchor="middle">10 Interviews +</text>
  <text x="320" y="272" class="card-artifact" text-anchor="middle">Problem Stmt</text>
  <text x="320" y="302" class="card-label" text-anchor="middle" fill="#0891b2" font-weight="bold">STAGE 2</text>

  <!-- Arrow 2→3 -->
  <g filter="url(#rough-arrow)">
    <line x1="420" y1="200" x2="470" y2="200" stroke="#777" stroke-width="2.5"/>
    <polygon points="468,192 482,200 468,208" fill="#777"/>
  </g>

  <!-- Card 3: Module 3 -->
  <rect x="440" y="85" width="180" height="230" rx="10" class="card-3" filter="url(#rough)"/>
  <text x="530" y="115" class="card-title" text-anchor="middle">Module 3</text>
  <text x="530" y="140" class="card-label" text-anchor="middle" font-weight="bold">Design from</text>
  <text x="530" y="160" class="card-label" text-anchor="middle">Evidence</text>
  <line x1="460" y1="175" x2="600" y2="175" stroke="#d97706" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  <text x="530" y="196" class="card-label" text-anchor="middle">~3-5 days</text>
  <line x1="460" y1="212" x2="600" y2="212" stroke="#d97706" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  <text x="530" y="234" class="card-artifact" text-anchor="middle">Artifact:</text>
  <text x="530" y="254" class="card-artifact" text-anchor="middle">Product Brief /</text>
  <text x="530" y="272" class="card-artifact" text-anchor="middle">Vibe PRD</text>
  <text x="530" y="302" class="card-label" text-anchor="middle" fill="#d97706" font-weight="bold">STAGE 3</text>

  <!-- Arrow 3→4 -->
  <g filter="url(#rough-arrow)">
    <line x1="630" y1="200" x2="680" y2="200" stroke="#777" stroke-width="2.5"/>
    <polygon points="678,192 692,200 678,208" fill="#777"/>
  </g>

  <!-- Card 4: Module 4 -->
  <rect x="650" y="85" width="180" height="230" rx="10" class="card-4" filter="url(#rough)"/>
  <text x="740" y="115" class="card-title" text-anchor="middle">Module 4</text>
  <text x="740" y="140" class="card-label" text-anchor="middle" font-weight="bold">Build It</text>
  <text x="740" y="160" class="card-label" text-anchor="middle">Yourself</text>
  <line x1="670" y1="175" x2="810" y2="175" stroke="#cc342d" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  <text x="740" y="196" class="card-label" text-anchor="middle">~2-4 weeks</text>
  <line x1="670" y1="212" x2="810" y2="212" stroke="#cc342d" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  <text x="740" y="234" class="card-artifact" text-anchor="middle">Artifact:</text>
  <text x="740" y="254" class="card-artifact" text-anchor="middle">Live MVP at</text>
  <text x="740" y="272" class="card-artifact" text-anchor="middle">real URL</text>
  <text x="740" y="302" class="card-label" text-anchor="middle" fill="#cc342d" font-weight="bold">STAGE 4</text>

  <!-- Arrow 4→5 -->
  <g filter="url(#rough-arrow)">
    <line x1="840" y1="200" x2="890" y2="200" stroke="#777" stroke-width="2.5"/>
    <polygon points="888,192 902,200 888,208" fill="#777"/>
  </g>

  <!-- Card 5: Module 5 -->
  <rect x="860" y="85" width="180" height="230" rx="10" class="card-5" filter="url(#rough)"/>
  <text x="950" y="115" class="card-title" text-anchor="middle">Module 5</text>
  <text x="950" y="140" class="card-label" text-anchor="middle" font-weight="bold">First Paying</text>
  <text x="950" y="160" class="card-label" text-anchor="middle">Customer</text>
  <line x1="880" y1="175" x2="1020" y2="175" stroke="#16a34a" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  <text x="950" y="196" class="card-label" text-anchor="middle">~2-4 weeks</text>
  <line x1="880" y1="212" x2="1020" y2="212" stroke="#16a34a" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  <text x="950" y="234" class="card-artifact" text-anchor="middle">Artifact:</text>
  <text x="950" y="254" class="card-artifact" text-anchor="middle">Signed Paid</text>
  <text x="950" y="272" class="card-artifact" text-anchor="middle">Pilot</text>
  <text x="950" y="302" class="card-label" text-anchor="middle" fill="#16a34a" font-weight="bold">DONE</text>

</svg>
