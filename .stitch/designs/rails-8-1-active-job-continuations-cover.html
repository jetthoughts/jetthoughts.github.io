<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Active Job Continuations — Cover</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
    }

    body {
      /* JetVelocity Obsidian Engine — simplified, premium */
      background:
        radial-gradient(ellipse 900px 500px at 72% 50%, rgba(204, 52, 45, 0.12) 0%, transparent 65%),
        radial-gradient(ellipse 700px 400px at 28% 55%, rgba(168, 85, 247, 0.08) 0%, transparent 60%),
        linear-gradient(145deg, #0d1016 0%, #141820 40%, #0f1218 100%);
      position: relative;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* Ultra-subtle grid — only visible on close inspection */
    body::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(223, 226, 235, 0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(223, 226, 235, 0.012) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* Brand — small, top-left, lives outside center-crop zone */
    .brand {
      position: absolute;
      top: 48px;
      left: 80px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: rgba(223, 226, 235, 0.45);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      z-index: 2;
    }

    /* Topic pill — top-right for asymmetry balance with brand */
    .topic-pill {
      position: absolute;
      top: 48px;
      right: 80px;
      display: inline-block;
      padding: 8px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #ffb4ab;
      background: rgba(204, 52, 45, 0.12);
      border: 1px solid rgba(204, 52, 45, 0.30);
      border-radius: 999px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      z-index: 2;
    }

    /* Headline — centered, compact.
       The 180×180 center-crop zone is x=510..690, y=225..405.
       This headline fits entirely within that zone so the thumbnail
       captures the full text without any clipping. */
    .headline {
      position: absolute;
      top: 180px;
      left: 50%;
      transform: translateX(-50%);
      width: 560px;
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      font-size: 68px;
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.025em;
      text-align: center;
      color: #dfe2eb;
      z-index: 2;
    }

    .headline .accent {
      background: linear-gradient(135deg, #cc342d 0%, #a855f7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Thin editorial rule — centered, below headline.
       Also within the center-crop zone. */
    .rule {
      position: absolute;
      top: 420px;
      left: 50%;
      transform: translateX(-50%);
      width: 56px;
      height: 2px;
      background: linear-gradient(90deg, #cc342d, #a855f7);
      z-index: 2;
    }

    /* Subtitle — below the crop zone, visible only on full cover.
       Gives context: what this post actually solves. */
    .subtitle {
      position: absolute;
      top: 460px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Inter', sans-serif;
      font-size: 20px;
      font-weight: 500;
      color: rgba(223, 226, 235, 0.35);
      letter-spacing: 0.01em;
      white-space: nowrap;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="brand">JetThoughts</div>
  <div class="topic-pill">Rails 8.1</div>

  <h1 class="headline">
    Active Job<br>
    <span class="accent">Continuations</span>
  </h1>

  <div class="rule"></div>
  <div class="subtitle">Background jobs that resume after deploy — zero lost work</div>
</body>
</html>
