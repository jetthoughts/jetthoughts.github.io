<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Active Job Continuations — Cover</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    html, body {
      width: 2400px;
      height: 1260px;
      overflow: hidden;
    }

    body {
      background:
        radial-gradient(ellipse 1600px 900px at 75% 45%, rgba(204, 52, 45, 0.10) 0%, transparent 65%),
        radial-gradient(ellipse 1200px 700px at 25% 60%, rgba(168, 85, 247, 0.08) 0%, transparent 60%),
        linear-gradient(145deg, #0d1016 0%, #141820 40%, #0f1218 100%);
      position: relative;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(223, 226, 235, 0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(223, 226, 235, 0.012) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
    }

    /* Brand — top-left, outside thumbnail crop zone (y<540) */
    .brand {
      position: absolute;
      top: 100px;
      left: 160px;
      font-family: 'Inter', sans-serif;
      font-size: 24px;
      font-weight: 600;
      color: rgba(223, 226, 235, 0.40);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      z-index: 2;
    }

    /* Topic pill — top-right, outside thumbnail crop zone */
    .topic-pill {
      position: absolute;
      top: 100px;
      right: 160px;
      display: inline-block;
      padding: 12px 28px;
      font-family: 'Inter', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: #ffb4ab;
      background: rgba(204, 52, 45, 0.12);
      border: 1px solid rgba(204, 52, 45, 0.30);
      border-radius: 999px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      z-index: 2;
    }

    /* Headline — positioned so BOTH lines fit in the 180×180 center crop.
       The 2400×1260 source is cropped to 180×180 from center (x=1110..1290, y=540..720).
       With font-size: 80px and line-height: 1.10, two lines = 176px tall.
       Placed at top: 540px so:
         Line 1 "Active Job":    y = 540..620  (fully in crop: 540..720) ✓
         Line 2 "Continuations": y = 620..700  (fully in crop: 540..720) ✓
       Width 800px, centered at x=800..1600 — the center x=1200 is well within crop x=1110..1290. */
    .headline {
      position: absolute;
      top: 540px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      font-size: 80px;
      font-weight: 800;
      line-height: 1.10;
      letter-spacing: -0.025em;
      text-align: center;
      color: #dfe2eb;
      z-index: 2;
    }

    .headline .accent {
      background: linear-gradient(135deg, #cc342d 0%, #a855f7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Thin rule — below the crop zone, visible on full cover only */
    .rule {
      position: absolute;
      top: 760px;
      left: 50%;
      transform: translateX(-50%);
      width: 64px;
      height: 2px;
      background: linear-gradient(90deg, #cc342d, #a855f7);
      z-index: 2;
    }

    /* Subtitle — below the crop zone, gives context on full cover */
    .subtitle {
      position: absolute;
      top: 800px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Inter', sans-serif;
      font-size: 28px;
      font-weight: 500;
      color: rgba(223, 226, 235, 0.35);
      letter-spacing: 0.01em;
      white-space: nowrap;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="brand">JetThoughts</div>
  <div class="topic-pill">Rails 8.1</div>

  <h1 class="headline">
    Active Job<br>
    <span class="accent">Continuations</span>
  </h1>

  <div class="rule"></div>
  <div class="subtitle">Background jobs that resume after deploy — zero lost work</div>
</body>
</html>
