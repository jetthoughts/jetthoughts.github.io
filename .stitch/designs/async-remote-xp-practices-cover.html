<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Async XP — Cover</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&family=Inter:wght@500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    /*
     * JetVelocity cover — Canonical 6-slot layout
     * See .stitch/design.md for the full spec.
     *
     * Slots:
     *   1. Brand + category           (top-left)
     *   2. Year pill                  (top-right)
     *   3. Headline (left, 2-3 lines) (middle-left)
     *   4. Visual ember               (middle-right)
     *   5. Stat chips (earned facts)  (bottom-left)
     *   6. Status indicator           (bottom-right)
     *
     * Anti-redundancy rules:
     *   - Pill carries YEAR, not version (version is in H1)
     *   - Stat chips carry facts NOT in the post title
     *   - No footer meta chip (tags render below cover)
     */

    * { margin: 0; padding: 0; box-sizing: border-box;
        -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility; }
    html, body { width: 2400px; height: 1260px; overflow: hidden; }

    body {
      background:
        radial-gradient(ellipse 1400px 900px at 78% 50%, rgba(168, 85, 247, 0.12) 0%, transparent 55%),
        radial-gradient(ellipse 1600px 1000px at 22% 45%, rgba(204, 52, 45, 0.10) 0%, transparent 60%),
        linear-gradient(135deg, #0d1117 0%, #10141a 45%, #1a0a2e 100%);
      position: relative;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #dfe2eb;
    }

    /* Subtle code-pattern dots */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(204, 52, 45, 0.05) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      opacity: 0.4;
    }

    .cover {
      position: absolute;
      inset: 0;
      padding: 100px 120px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      z-index: 2;
    }

    /* ─── SLOT 1 + 2 : top row ─────────────────────────────────── */
    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .brand .name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #ffffff;
    }
    .brand .divider {
      width: 3px;
      height: 44px;
      background: rgba(204, 52, 45, 0.50);
      border-radius: 2px;
    }
    .brand .category {
      font-family: 'Inter', sans-serif;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(223, 226, 235, 0.60);
    }

    .pill {
      padding: 20px 44px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.005em;
      color: #ffedeb;
      background: linear-gradient(135deg, #cc342d 0%, #b22822 100%);
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.12);
      box-shadow:
        0 8px 32px rgba(204, 52, 45, 0.35),
        0 0 0 1px rgba(255, 255, 255, 0.04) inset;
    }

    /* ─── SLOT 3 + 4 : middle row ──────────────────────────────── */
    .middle-row {
      display: grid;
      grid-template-columns: 8fr 4fr;
      align-items: center;
      gap: 80px;
      flex: 1;
      padding: 40px 0;
    }

    .headline {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .headline .line {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      line-height: 1.00;
      letter-spacing: -0.030em;
      font-size: 180px;
    }
    .headline .line-1 { color: #ffffff; }
    .headline .line-2 {
      background: linear-gradient(90deg, #cc342d 0%, #e84949 40%, #a855f7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .headline .line-3 {
      color: #ffffff;
      font-size: 150px;
      margin-top: 4px;
    }

    /* ─── SLOT 4 : ruby gem visual ─────────────────────────────── */
    .visual {
      position: relative;
      width: 560px;
      height: 560px;
      justify-self: center;
      filter:
        drop-shadow(0 0 60px rgba(204, 52, 45, 0.50))
        drop-shadow(0 0 120px rgba(168, 85, 247, 0.35));
    }
    .visual svg { width: 100%; height: 100%; display: block; }
    /* Concentric halo rings behind the gem */
    .visual .halo {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
    }
    .visual .halo-1 {
      border: 2px solid rgba(168, 85, 247, 0.14);
      transform: scale(1.00);
    }
    .visual .halo-2 {
      inset: 8%;
      border: 2px solid rgba(204, 52, 45, 0.20);
    }

    /* ─── SLOT 5 + 6 : bottom row ──────────────────────────────── */
    .bottom-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 40px;
    }

    .chips {
      display: flex;
      gap: 24px;
      flex-wrap: nowrap;
    }
    .chip {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 28px 18px 24px;
      background: rgba(28, 32, 38, 0.75);
      border-left: 4px solid;
      border-radius: 10px;
      backdrop-filter: blur(8px);
    }
    .chip .label {
      font-family: 'Inter', sans-serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(223, 226, 235, 0.60);
    }
    .chip .value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.005em;
    }
    .chip-1 { border-color: #cc342d; }
    .chip-1 .value { color: #ff8a80; }
    .chip-2 { border-color: #a855f7; }
    .chip-2 .value { color: #ddb7ff; }
    .chip-3 { border-color: #7dd0fe; }
    .chip-3 .value { color: #bfe5ff; }

    .status {
      display: flex;
      align-items: center;
      gap: 14px;
      font-family: 'JetBrains Mono', 'Inter', monospace;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: rgba(223, 226, 235, 0.50);
    }
    .status .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.7);
    }

    /* Bottom hairline */
    .cover::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, rgba(204, 52, 45, 0.35) 50%, transparent 100%);
    }
  </style>
</head>
<body>
  <div class="cover">
    <!-- SLOT 1 + 2 -->
    <header class="top-row">
      <div class="brand">
        <span class="name">JetThoughts</span>
        <span class="divider"></span>
        <span class="category">Engineering</span>
      </div>
      <div class="pill">Ruby on Rails 2026</div>
    </header>

    <!-- SLOT 3 + 4 -->
    <div class="middle-row">
      <h1 class="headline">
        <span class="line line-1">Async-First</span>
        <span class="line line-2">XP Practices</span>
        <span class="line line-3">Remote Teams</span>
      </h1>
      <div class="visual">
        <div class="halo halo-1"></div>
        <div class="halo halo-2"></div>
        <svg viewBox="0 0 560 560" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gem-face" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ff8a7a"/>
              <stop offset="35%" stop-color="#e84949"/>
              <stop offset="70%" stop-color="#cc342d"/>
              <stop offset="100%" stop-color="#6a110c"/>
            </linearGradient>
            <linearGradient id="gem-top" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#ffb4ab"/>
              <stop offset="100%" stop-color="#cc342d"/>
            </linearGradient>
            <linearGradient id="gem-side" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#cc342d"/>
              <stop offset="100%" stop-color="#3a0806"/>
            </linearGradient>
            <linearGradient id="gem-bottom" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#a8231e"/>
              <stop offset="100%" stop-color="#2a0504"/>
            </linearGradient>
          </defs>
          <polygon points="120,160 280,60 440,160" fill="url(#gem-top)"/>
          <polygon points="120,160 440,160 500,280 280,500 60,280" fill="url(#gem-face)"/>
          <polygon points="60,280 280,500 180,330" fill="url(#gem-side)" opacity="0.75"/>
          <polygon points="500,280 280,500 380,330" fill="url(#gem-bottom)" opacity="0.85"/>
          <polygon points="120,160 440,160 380,220 180,220" fill="url(#gem-top)" opacity="0.55"/>
          <polygon points="150,170 260,85 270,170" fill="#ffd4ce" opacity="0.55"/>
          <polygon points="230,190 310,190 300,250 240,250" fill="#ffffff" opacity="0.35"/>
          <polygon points="280,500 180,330 280,360" fill="#ff8a7a" opacity="0.35"/>
        </svg>
      </div>
    </div>

    <!-- SLOT 5 + 6 -->
    <footer class="bottom-row">
      <div class="chips">
        <div class="chip chip-1">
          <span class="label">Timezones</span>
          <span class="value">3+ regions</span>
        </div>
        <div class="chip chip-2">
          <span class="label">Method</span>
          <span class="value">pair programming</span>
        </div>
        <div class="chip chip-3">
          <span class="label">Case Study</span>
          <span class="value">CSS migration</span>
        </div>
      </div>
      <div class="status">
        <span class="dot"></span>
        <span>Team Tested</span>
      </div>
    </footer>
  </div>
</body>
</html>
