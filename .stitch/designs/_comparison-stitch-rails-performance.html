<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>JetThoughts Technical Blog Cover</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-surface": "#dfe2eb",
                    "on-primary-container": "#ffedeb",
                    "secondary-container": "#6f00be",
                    "primary-fixed-dim": "#ffb4ab",
                    "on-secondary-container": "#d6a9ff",
                    "on-secondary": "#490080",
                    "on-secondary-fixed": "#2c0051",
                    "on-primary-fixed": "#410002",
                    "secondary-fixed-dim": "#ddb7ff",
                    "surface-variant": "#31353c",
                    "surface-bright": "#353940",
                    "on-error-container": "#ffdad6",
                    "background": "#10141a",
                    "inverse-primary": "#b62320",
                    "secondary-fixed": "#f0dbff",
                    "tertiary-container": "#0076a0",
                    "surface-container-lowest": "#0a0e14",
                    "outline-variant": "#5a403d",
                    "inverse-on-surface": "#2d3137",
                    "on-tertiary": "#00344a",
                    "surface": "#10141a",
                    "on-primary": "#690005",
                    "primary-fixed": "#ffdad6",
                    "surface-container-low": "#181c22",
                    "on-surface-variant": "#e3beb9",
                    "surface-container-high": "#262a31",
                    "on-surface": "#dfe2eb",
                    "surface-dim": "#10141a",
                    "on-secondary-fixed-variant": "#6900b3",
                    "outline": "#aa8985",
                    "primary": "#ffb4ab",
                    "on-primary-fixed-variant": "#93010a",
                    "surface-container-highest": "#31353c",
                    "on-tertiary-fixed-variant": "#004c69",
                    "on-tertiary-container": "#e4f3ff",
                    "surface-container": "#1c2026",
                    "surface-tint": "#ffb4ab",
                    "error": "#ffb4ab",
                    "tertiary": "#7dd0fe",
                    "on-error": "#690005",
                    "on-background": "#dfe2eb",
                    "secondary": "#ddb7ff",
                    "primary-container": "#cc342d",
                    "tertiary-fixed": "#c4e7ff",
                    "on-tertiary-fixed": "#001e2c",
                    "error-container": "#93000a",
                    "tertiary-fixed-dim": "#7dd0fe"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .code-pattern {
            background-image: radial-gradient(rgba(204, 52, 45, 0.05) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .ruby-glow {
            filter: drop-shadow(0 0 40px rgba(204, 52, 45, 0.4)) drop-shadow(0 0 80px rgba(111, 0, 190, 0.3));
        }
    </style>
</head>
<body class="bg-background text-on-background font-body antialiased">
<!-- Technical Blog Cover Container (1200x630 forced ratio via max-w and aspect-ratio) -->
<div class="relative w-full max-w-[1200px] h-[630px] mx-auto overflow-hidden bg-gradient-to-br from-[#0d1117] via-[#10141a] to-[#1a0a2e] flex flex-col justify-between p-12 border border-outline-variant/10 shadow-2xl">
<!-- Background Decorative Layer -->
<div class="absolute inset-0 code-pattern pointer-events-none opacity-40"></div>
<div class="absolute inset-0 bg-[radial-gradient(circle_at_70%_50%,_rgba(111,0,190,0.1),_transparent_50%)] pointer-events-none"></div>
<!-- Top Row -->
<div class="relative z-10 flex justify-between items-start">
<div class="flex items-center gap-3">
<span class="text-3xl font-headline font-bold tracking-tighter text-on-surface">JetThoughts</span>
<div class="h-6 w-[2px] bg-primary-container/40"></div>
<span class="text-sm font-label tracking-[0.2em] text-on-background/50 uppercase">Engineering</span>
</div>
<div class="px-5 py-2 bg-primary-container text-on-primary-container font-headline font-bold tracking-tight rounded-full text-lg shadow-lg shadow-primary-container/20 border border-white/10">
                Ruby on Rails 2026
            </div>
</div>
<!-- Middle Row: Content & Visual -->
<div class="relative z-10 grid grid-cols-12 items-center flex-grow">
<!-- Left: Headline Section -->
<div class="col-span-8 flex flex-col gap-6">
<h1 class="text-6xl font-headline font-bold leading-[1.05] tracking-tight text-white max-w-2xl">
                    Rails Performance <br/>
<span class="bg-gradient-to-r from-primary-container to-secondary text-transparent bg-clip-text">Optimization Patterns</span> <br/>
                    That Matter
                </h1>
</div>
<!-- Right: Stylized Ruby Gem / Crystal -->
<div class="col-span-4 flex justify-center items-center relative">
<div class="ruby-glow relative w-64 h-64 flex items-center justify-center">
<img alt="Abstract Stylized Ruby" class="w-56 h-56 text-primary-container opacity-90 drop-shadow-[0_0_20px_rgba(204,52,45,0.6)]" data-alt="A futuristic, stylized geometric ruby gemstone glowing with intense ruby red and deep neon purple light pulses on a dark tech background." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAMeLsLa2cTANtNH3e2Mhm-jXc0AiKyE8rickL-Vj6k7y7Lc7IzsKDsdQB_NcXnqdNxohSYdmbJ1StNXD0vBkdDKIdawyIXOPz7y_jemcFN3l_eJjwIXs2CyDNgWyunZdQHiJ5FbZ9ntFwuCeZER6Ad7bAdpJfkZXV3hqZHTVx4pwVETh9FPVCjRNu6sBJgPj5euuklTpgh7I4v3liJCogOTVK8QSm84YbIwFWpALxM_I9URmUGm5gUj9pYGXOb831itKxl0eZ2M4Q"/>
<!-- Geometric "Code" Overlays -->
<div class="absolute inset-0 border border-secondary-container/20 rounded-full scale-125 animate-pulse"></div>
<div class="absolute inset-0 border border-primary-container/10 rounded-full scale-150"></div>
</div>
</div>
</div>
<!-- Bottom Row: Metrics/Badges -->
<div class="relative z-10 flex items-center gap-4">
<div class="flex items-center gap-2 px-4 py-1.5 bg-surface-container-high rounded-md border-l-2 border-primary-container">
<span class="text-xs font-label text-on-surface-variant font-medium tracking-wide uppercase">YJIT</span>
<span class="text-sm font-headline font-bold text-tertiary">94.7% faster</span>
</div>
<div class="flex items-center gap-2 px-4 py-1.5 bg-surface-container-high rounded-md border-l-2 border-secondary">
<span class="text-xs font-label text-on-surface-variant font-medium tracking-wide uppercase">Framework</span>
<span class="text-sm font-headline font-bold text-on-surface">Rails 8</span>
</div>
<div class="flex items-center gap-2 px-4 py-1.5 bg-surface-container-high rounded-md border-l-2 border-tertiary">
<span class="text-xs font-label text-on-surface-variant font-medium tracking-wide uppercase">Redis</span>
<span class="text-sm font-headline font-bold text-on-surface">1.5x</span>
</div>
<div class="ml-auto flex items-center gap-2 text-on-background/40">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">terminal</span>
<span class="text-[10px] font-label tracking-widest uppercase">System Operational</span>
</div>
</div>
<!-- Subtle Gradient Edge for depth -->
<div class="absolute bottom-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-primary-container/30 to-transparent"></div>
</div>
</body></html>
